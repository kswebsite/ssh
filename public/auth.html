<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KS SSH - Auth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0a;
      --bg-tertiary: #111111;
      --bg-input: #1a1a1a;
      --border-color: #2a2a2a;
      --border-focus: #00d4ff;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --accent-primary: #00d4ff;
      --accent-secondary: #0099cc;
      --accent-glow: rgba(0, 212, 255, 0.3);
      --error: #ff4444;
      --success: #00ff88;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background Mesh */
    .bg-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 153, 204, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 40%);
      animation: meshMove 20s ease-in-out infinite;
    }

    @keyframes meshMove {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* Grid Pattern Overlay */
    .bg-mesh::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.5;
    }

    /* Main Container */
    .container {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Auth Panel - Glass Effect */
    .auth-panel {
      width: 100%;
      max-width: 420px;
      background: rgba(17, 17, 17, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 212, 255, 0.1);
    }

    /* Top Gradient Line */
    .auth-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, 
        transparent 0%, 
        var(--accent-primary) 20%, 
        var(--accent-secondary) 50%, 
        var(--accent-primary) 80%, 
        transparent 100%);
      opacity: 0.8;
    }

    /* Decorative Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: -1;
    }

    .orb-1 {
      width: 150px;
      height: 150px;
      background: var(--accent-primary);
      opacity: 0.15;
      top: -50px;
      right: -50px;
      animation: float 6s ease-in-out infinite;
    }

    .orb-2 {
      width: 120px;
      height: 120px;
      background: var(--accent-secondary);
      opacity: 0.12;
      bottom: -40px;
      left: -40px;
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(10px, -10px) scale(1.1); }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 
        0 10px 30px -10px var(--accent-glow),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .logo-icon:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 
        0 15px 40px -10px var(--accent-glow),
        0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    /* FIXED: SVG now perfectly fits the 48px container */
    .logo-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .title {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 1.5rem;
      position: relative;
    }

    .tab-btn {
      flex: 1;
      padding: 1rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent-primary);
    }

    .tab-indicator {
      position: absolute;
      bottom: -1px;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 50%;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* Forms */
    .form-container {
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .form-container.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      transition: color 0.3s ease;
    }

    .form-group:focus-within .form-label {
      color: var(--accent-primary);
    }

    .input-field {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
      -webkit-appearance: none;
    }

    .input-field::placeholder {
      color: var(--text-muted);
    }

    .input-field:hover {
      border-color: rgba(0, 212, 255, 0.3);
    }

    .input-field:focus {
      border-color: var(--accent-primary);
      box-shadow: 
        0 0 0 3px var(--accent-glow),
        inset 0 1px 2px rgba(0, 0, 0, 0.2);
      background: var(--bg-secondary);
    }

    /* Checkbox & Extras */
    .form-extras {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 1rem 0;
      font-size: 0.875rem;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .checkbox-wrapper input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-primary);
      cursor: pointer;
    }

    .checkbox-wrapper span {
      color: var(--text-secondary);
      transition: color 0.3s ease;
    }

    .checkbox-wrapper:hover span {
      color: var(--text-primary);
    }

    .link {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
    }

    .link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent-primary);
      transition: width 0.3s ease;
    }

    .link:hover::after {
      width: 100%;
    }

    .link:hover {
      color: var(--text-primary);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* Submit Button */
    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 
        0 10px 30px -10px var(--accent-glow),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 15px 40px -10px var(--accent-glow),
        0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Error Messages */
    .error-message {
      color: var(--error);
      text-align: center;
      margin-top: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      display: none;
      animation: shake 0.5s ease;
    }

    .error-message.visible {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .footer-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .footer-text span {
      color: var(--accent-primary);
      font-weight: 600;
    }

    .trust-badges {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .badge {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .badge:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: var(--accent-primary);
      transform: translateY(-2px);
    }

    /* Terms Checkbox Special */
    .terms-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin: 1rem 0;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .terms-wrapper input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--accent-primary);
      flex-shrink: 0;
      cursor: pointer;
    }

    .terms-wrapper span {
      color: var(--text-secondary);
    }

    /* Desktop Enhancements */
    @media (min-width: 640px) {
      .auth-panel {
        padding: 2.5rem;
        max-width: 480px;
      }

      .logo-icon {
        width: 56px;
        height: 56px;
      }

      .title {
        font-size: 2rem;
      }

      .tab-btn {
        font-size: 1.125rem;
        padding: 1.25rem;
      }

      .input-field {
        padding: 1rem 1.25rem;
        font-size: 1.0625rem;
      }

      .btn-primary {
        padding: 1.125rem;
        font-size: 1.0625rem;
      }

      .form-label {
        font-size: 0.8125rem;
      }
    }

    @media (min-width: 1024px) {
      .auth-panel {
        max-width: 440px;
        padding: 3rem;
      }

      .bg-mesh {
        background: 
          radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(0, 153, 204, 0.1) 0%, transparent 40%),
          radial-gradient(circle at 40% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 35%);
      }
    }

    /* Mobile Optimizations */
    @media (max-width: 380px) {
      .auth-panel {
        padding: 1.5rem;
        border-radius: 20px;
      }

      .title {
        font-size: 1.5rem;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
      }
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Focus Visible for Accessibility */
    .tab-btn:focus-visible,
    .input-field:focus-visible,
    .btn-primary:focus-visible,
    .link:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  
  <div class="container">
    <div class="auth-panel">
      <!-- Decorative Orbs -->
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>

      <!-- Header -->
      <div class="header">
        <div class="logo-wrapper">
          <!-- FIXED LOGO: Removed <?xml> declaration + set width/height to 100% so it perfectly fits the 48px container without any extra space -->
          <div class="logo-icon">
            <svg width="100%" height="100%" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
              <defs>
                <!-- Gradient for the main background -->
                <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#1a1a2e"/>
                  <stop offset="50%" style="stop-color:#16213e"/>
                  <stop offset="100%" style="stop-color:#0f3460"/>
                </linearGradient>

                <!-- Gradient for the terminal -->
                <linearGradient id="terminalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" style="stop-color:#2d2d44"/>
                  <stop offset="100%" style="stop-color:#1e1e2e"/>
                </linearGradient>

                <!-- Gradient for the shield -->
                <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#00d4aa"/>
                  <stop offset="50%" style="stop-color:#00b894"/>
                  <stop offset="100%" style="stop-color:#009970"/>
                </linearGradient>

                <!-- Glow effect -->
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                  <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>

                <!-- Drop shadow -->
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
                </filter>
              </defs>

              <!-- Background circle -->
              <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

              <!-- Outer ring -->
              <circle cx="256" cy="256" r="220" stroke="#3d3d5c" stroke-width="2" fill="none"/>

              <!-- Terminal Window -->
              <g filter="url(#shadow)">
                <!-- Terminal body -->
                <rect x="96" y="120" width="320" height="240" rx="16" fill="url(#terminalGradient)" stroke="#3d3d5c" stroke-width="2"/>

                <!-- Terminal header -->
                <rect x="96" y="120" width="320" height="36" rx="16" fill="#3d3d5c"/>
                <rect x="96" y="140" width="320" height="16" fill="#3d3d5c"/>

                <!-- Window controls -->
                <circle cx="124" cy="138" r="6" fill="#ff5f56"/>
                <circle cx="146" cy="138" r="6" fill="#ffbd2e"/>
                <circle cx="168" cy="138" r="6" fill="#27c93f"/>

                <!-- Terminal content area -->
                <rect x="112" y="164" width="288" height="180" rx="8" fill="#0d0d14"/>

                <!-- Command prompt lines -->
                <g fill="#00d4aa" font-family="monospace" font-size="14" font-weight="500">
                  <!-- Prompt symbol -->
                  <text x="128" y="200" fill="#e94560">➜</text>
                  <text x="148" y="200" fill="#00d4aa">~</text>
                  <text x="172" y="200" fill="#ffffff">ssh</text>
                  <text x="208" y="200" fill="#a0a0a0">user@server</text>

                  <!-- Connection status -->
                  <text x="128" y="230" fill="#00d4aa">✓</text>
                  <text x="148" y="230" fill="#a0a0a0">Connected securely</text>

                  <!-- Cursor -->
                  <rect x="128" y="250" width="10" height="16" fill="#00d4aa" opacity="0.8">
                    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
                  </rect>
                </g>
              </g>

              <!-- Shield icon overlay -->
              <g transform="translate(320, 280)" filter="url(#shadow)">
                <!-- Shield shape -->
                <path d="M0 10 Q0 0 10 0 L30 0 Q40 0 40 10 L40 25 Q40 45 20 55 Q0 45 0 25 Z" 
                      fill="url(#shieldGradient)" stroke="#00d4aa" stroke-width="2"/>

                <!-- Lock icon inside shield -->
                <rect x="12" y="18" width="16" height="14" rx="2" fill="#1a1a2e"/>
                <rect x="15" y="12" width="10" height="8" rx="5" fill="none" stroke="#1a1a2e" stroke-width="3"/>
                <circle cx="20" cy="25" r="2" fill="#00d4aa"/>
                <path d="M20 27 L20 30" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
              </g>

              <!-- Network connection lines -->
              <g stroke="#00d4aa" stroke-width="2" stroke-linecap="round" opacity="0.6">
                <line x1="80" y1="400" x2="120" y2="360">
                  <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite"/>
                </line>
                <line x1="120" y1="400" x2="160" y2="360">
                  <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
                </line>
                <line x1="160" y1="400" x2="200" y2="360">
                  <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
                </line>
              </g>

              <!-- Decorative dots -->
              <g fill="#00d4aa" opacity="0.4">
                <circle cx="72" cy="120" r="4"/>
                <circle cx="440" cy="120" r="4"/>
                <circle cx="72" cy="392" r="4"/>
                <circle cx="440" cy="392" r="4"/>
              </g>

              <!-- KS text watermark -->
              <text x="256" y="460" text-anchor="middle" fill="#3d3d5c" font-family="system-ui, sans-serif" 
                    font-size="24" font-weight="700" letter-spacing="4">KS SSH</text>
            </svg>
          </div>
          <h1 class="title">SSH</h1>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button onclick="switchTab(0)" id="tab-login" class="tab-btn active">Login</button>
        <button onclick="switchTab(1)" id="tab-register" class="tab-btn">Register</button>
        <div class="tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="form-container visible">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email or Username</label>
            <input 
              id="login-identifier" 
              type="text" 
              required 
              class="input-field"
              placeholder="Enter your email or username"
              autocomplete="username"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <input 
              id="login-password" 
              type="password" 
              required 
              class="input-field"
              placeholder="Enter your password"
              autocomplete="current-password"
            >
          </div>

          <div class="form-extras">
            <label class="checkbox-wrapper">
              <input type="checkbox">
              <span>Remember me</span>
            </label>
            <a href="#" class="link">Forgot?</a>
          </div>

          <button type="submit" class="btn-primary">
            Sign In
          </button>
        </form>
        <p id="login-error" class="error-message">Invalid credentials</p>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" class="form-container">
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input 
              id="reg-username" 
              type="text" 
              required 
              class="input-field"
              placeholder="Choose a username"
              autocomplete="username"
            >
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input 
              id="reg-email" 
              type="email" 
              required 
              class="input-field"
              placeholder="your@email.com"
              autocomplete="email"
            >
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input 
              id="reg-password" 
              type="password" 
              required 
              class="input-field"
              placeholder="Create a strong password"
              autocomplete="new-password"
            >
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input 
              id="reg-confirm" 
              type="password" 
              required 
              class="input-field"
              placeholder="Confirm your password"
              autocomplete="new-password"
            >
          </div>

          <div class="terms-wrapper">
            <input type="checkbox" required id="terms">
            <span>I agree to the <a href="#" class="link">Terms</a> and <a href="#" class="link">Privacy Policy</a></span>
          </div>

          <button type="submit" class="btn-primary">
            Create Account
          </button>
        </form>
        <p id="register-error" class="error-message">Please check your inputs</p>
      </div>

    </div>
  </div>

  <script>
    // Tab Switching
    function switchTab(index) {
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const indicator = document.getElementById('tab-indicator');
      
      // Reset errors
      document.getElementById('login-error').classList.remove('visible');
      document.getElementById('register-error').classList.remove('visible');

      if (index === 0) {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.add('visible');
        registerForm.classList.remove('visible');
        indicator.style.transform = 'translateX(0)';
      } else {
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
        loginForm.classList.remove('visible');
        registerForm.classList.add('visible');
        indicator.style.transform = 'translateX(100%)';
      }
    }

    // Login Handler
    function handleLogin(e) {
      e.preventDefault();
      const identifier = document.getElementById('login-identifier').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      
      // Simulate validation
      if (identifier.length < 3 || password.length < 6) {
        errorEl.textContent = 'Invalid credentials';
        errorEl.classList.add('visible');
      } else {
        errorEl.classList.remove('visible');
        // Success animation
        const btn = e.target.querySelector('.btn-primary');
        btn.textContent = '✓ Success';
        btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc6a)';
        setTimeout(() => {
          btn.textContent = 'Sign In';
          btn.style.background = '';
        }, 2000);
      }
    }

    // Register Handler
    function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('reg-username').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const errorEl = document.getElementById('register-error');
      
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.classList.add('visible');
        return;
      }
      
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters';
        errorEl.classList.add('visible');
        return;
      }
      
      errorEl.classList.remove('visible');
      // Success animation
      const btn = e.target.querySelector('.btn-primary');
      btn.textContent = '✓ Account Created';
      btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc6a)';
      setTimeout(() => {
        btn.textContent = 'Create Account';
        btn.style.background = '';
        switchTab(0);
      }, 2000);
    }

    // Initialize indicator position
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('tab-indicator').style.transform = 'translateX(0)';
    });
  </script>
</body>
</html>
