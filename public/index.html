<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS SSH — Web Terminal</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <style>
        body, html {
            height: 100dvh;
            width: 100%;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        
        /* Sidebar */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 767px) {
            #sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        
        .logo svg { width: 24px; height: 24px; color: white; }
        
        .brand h1 { font-size: 18px; font-weight: 700; }
        .brand p { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 1px; }
        
        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 16px 8px 8px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border-left: 3px solid var(--accent);
        }
        
        .nav-item svg { width: 18px; height: 18px; }
        
        .terminal-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .terminal-item:hover { background: rgba(59, 130, 246, 0.05); }
        .terminal-item.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); }
        
        .terminal-info { flex: 1; min-width: 0; }
        .terminal-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .terminal-token { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
        
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
        }
        
        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #10b981);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .user-details p:first-child { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .user-details p:last-child { font-size: 14px; font-weight: 600; }
        
        /* Main Content */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
        }
        
        .top-bar {
            height: 64px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .top-bar-left { display: flex; align-items: center; gap: 16px; }
        
        .iframe-container { flex: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: 0; }
        
        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.show { display: flex; }
        
        .modal {
            width: 100%;
            max-width: 440px;
            animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title { display: flex; align-items: center; gap: 12px; }
        .modal-title svg { width: 24px; height: 24px; color: var(--accent); }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; }

        /* Context Menu */
        .context-menu {
            position: absolute;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 6px;
            z-index: 10000;
            min-width: 180px;
            display: none;
        }
        .context-menu button {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 8px 12px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            border-radius: var(--radius-sm);
        }
        .context-menu button:hover { background: rgba(255, 255, 255, 0.05); }
        .context-menu button.delete { color: var(--danger); }
        .context-menu button.delete:hover { background: rgba(248, 113, 113, 0.1); }
    </style>
</head>
<body>
    <div class="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <div class="brand">
                    <h1>KS SSH</h1>
                    <p>WEB TERMINAL</p>
                </div>
            </div>

            <div class="sidebar-scroll">
                <div class="section-label">General</div>
                <div class="nav-item active" onclick="goHome()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5"/>
                    </svg>
                    <span>Dashboard</span>
                </div>

                <div class="section-label">Workspaces</div>
                <div style="padding: 0 8px 8px;">
                    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                        <select id="workspace-dropdown" class="input" style="flex: 1; padding: 8px;"></select>
                        <button onclick="showCreateWorkspaceModal()" class="btn btn-secondary" style="padding: 8px;">
                            <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="section-label">Terminals</div>
                <button onclick="showAddModal()" class="btn btn-primary" style="width: 100%; margin-bottom: 12px;">
                    <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span>Add Terminal</span>
                </button>

                <div id="terminals-list"></div>
            </div>

            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="avatar">👤</div>
                    <div class="user-details">
                        <p>Signed in as</p>
                        <p id="username-display">Loading...</p>
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button onclick="handleLogout()" class="btn btn-danger" style="flex: 1;">
                        <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </aside>

        <main id="main-content">
            <div class="top-bar">
                <div class="top-bar-left">
                    <button class="btn btn-ghost" onclick="toggleSidebar()" style="padding: 8px; @media(min-width:768px){display:none;}">
                        <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <h2 id="page-title" style="font-size: 18px; font-weight: 600;">Dashboard</h2>
                </div>
                <div class="top-bar-right">
                    <div id="credits-badge" class="badge badge-primary">0 CREDITS</div>
                </div>
            </div>
            <div class="iframe-container" id="content-area">
                <iframe src="dashboard.html" id="main-iframe"></iframe>
            </div>
        </main>
    </div>

    <!-- MODALS -->
    <div id="add-modal" class="modal-overlay" onclick="if(event.target===this)hideAddModal()">
        <div class="modal card glass">
            <div class="modal-header">
                <div class="modal-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <h3>Add Terminal</h3>
                </div>
                <button class="btn btn-ghost" onclick="hideAddModal()">✕</button>
            </div>
            <div class="form-group">
                <label class="form-label">Display Name</label>
                <input id="modal-name" type="text" class="input" placeholder="Web Server 01">
            </div>
            <div class="form-group">
                <label class="form-label">Token</label>
                <input id="modal-token" type="text" class="input" placeholder="ks-token-xxxx-xxxx">
            </div>
            <div class="form-group">
                <label class="form-label">Workspace</label>
                <select id="modal-workspace" class="input"></select>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="hideAddModal()">Cancel</button>
                <button class="btn btn-primary" style="flex: 1;" onclick="handleAddTerminal()">Add Terminal</button>
            </div>
        </div>
    </div>

    <!-- More modals (Rename, Delete, etc.) follow similar pattern -->
    <div id="rename-modal" class="modal-overlay" onclick="if(event.target===this)hideRenameModal()">
        <div class="modal card glass">
            <div class="modal-header">
                <div class="modal-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    <h3>Rename Terminal</h3>
                </div>
                <button class="btn btn-ghost" onclick="hideRenameModal()">✕</button>
            </div>
            <div class="form-group">
                <label class="form-label">New Name</label>
                <input id="rename-input" type="text" class="input">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="hideRenameModal()">Cancel</button>
                <button class="btn btn-primary" style="flex: 1;" onclick="confirmRename()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay" onclick="if(event.target===this)hideDeleteModal()">
        <div class="modal card glass" style="border-color: rgba(248, 113, 113, 0.3);">
            <div class="modal-header">
                <div class="modal-title">
                    <svg style="color: var(--danger);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    <h3 style="color: var(--danger);">Delete Terminal</h3>
                </div>
                <button class="btn btn-ghost" onclick="hideDeleteModal()">✕</button>
            </div>
            <p style="color: var(--text-secondary); margin-bottom: 24px;">Are you sure you want to delete this terminal? This action cannot be undone.</p>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="hideDeleteModal()">Cancel</button>
                <button class="btn btn-danger" style="flex: 1;" onclick="confirmDelete()">Delete Forever</button>
            </div>
        </div>
    </div>

    <div id="create-ws-modal" class="modal-overlay" onclick="if(event.target===this)hideCreateWorkspaceModal()">
        <div class="modal card glass">
            <div class="modal-header">
                <div class="modal-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 01-2-2H7a2 2 0 01-2 2v16m14 0h-4m-6 0H5"/></svg>
                    <h3>Create Workspace</h3>
                </div>
                <button class="btn btn-ghost" onclick="hideCreateWorkspaceModal()">✕</button>
            </div>
            <div class="form-group">
                <label class="form-label">Workspace Name</label>
                <input id="ws-name-input" type="text" class="input" placeholder="Development">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="hideCreateWorkspaceModal()">Cancel</button>
                <button class="btn btn-primary" style="flex: 1;" onclick="confirmCreateWorkspace()">Create Workspace</button>
            </div>
        </div>
    </div>

    <div id="context-menu" class="context-menu">
        <button onclick="contextEdit()">
            <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            Rename
        </button>
        <button onclick="contextDelete()" class="delete">
            <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Delete
        </button>
    </div>

    <script>
        let terminals = [];
        let workspaces = [];
        let activeId = null;
        let currentUser = null;
        let currentWorkspaceId = 'all';
        let currentContextId = null;

        function loadTerminals() {
            terminals = JSON.parse(localStorage.getItem('ks_ssh_terminals') || '[]');
        }
        function saveTerminals() {
            localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
        }
        function loadWorkspaces() {
            workspaces = JSON.parse(localStorage.getItem('ks_ssh_workspaces') || '[]');
        }
        function saveWorkspaces() {
            localStorage.setItem('ks_ssh_workspaces', JSON.stringify(workspaces));
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function goHome() {
            activeId = null;
            document.getElementById('page-title').textContent = 'Dashboard';
            document.getElementById('main-iframe').src = 'dashboard.html';
            renderList();
        }

        function selectTerminal(id) {
            activeId = id;
            const term = terminals.find(t => t.id === id);
            if (!term) return;
            document.getElementById('page-title').textContent = term.name;
            document.getElementById('main-iframe').src = 'terminal.html?token=' + term.token;
            renderList();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function renderList() {
            const container = document.getElementById('terminals-list');
            container.innerHTML = '';

            let filtered = terminals;
            if (currentWorkspaceId !== 'all') {
                filtered = terminals.filter(t => t.workspaceId === currentWorkspaceId);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--text-muted); font-size: 12px;">No terminals here</div>';
                return;
            }

            filtered.forEach(term => {
                const active = term.id === activeId ? 'active' : '';
                const div = document.createElement('div');
                div.className = `terminal-item ${active}`;
                div.onclick = () => selectTerminal(term.id);
                div.innerHTML = `
                    <div class="terminal-info">
                        <div class="terminal-name">${term.name}</div>
                        <div class="terminal-token">${term.token}</div>
                    </div>
                    <button class="btn btn-ghost" style="padding: 4px;" onclick="event.stopPropagation(); showTerminalMenu('${term.id}', event)">
                        <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01"/></svg>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function showTerminalMenu(id, event) {
            currentContextId = id;
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.top = event.clientY + 'px';
            menu.style.left = (event.clientX - 180) + 'px';

            const hide = () => {
                menu.style.display = 'none';
                document.removeEventListener('click', hide);
            };
            setTimeout(() => document.addEventListener('click', hide), 10);
        }

        function contextEdit() { showRenameModal(currentContextId); }
        function contextDelete() { showDeleteModal(currentContextId); }

        function showAddModal() {
            populateWorkspaceSelects();
            document.getElementById('add-modal').classList.add('show');
        }
        function hideAddModal() { document.getElementById('add-modal').classList.remove('show'); }

        function handleAddTerminal() {
            const name = document.getElementById('modal-name').value.trim();
            const token = document.getElementById('modal-token').value.trim();
            const wsId = document.getElementById('modal-workspace').value;
            if (!token) return alert('Token is required');

            const newTerm = {
                id: Date.now().toString(),
                name: name || 'Terminal',
                token,
                workspaceId: wsId || 'default-ws',
                added: Date.now()
            };
            terminals.unshift(newTerm);
            saveTerminals();
            renderList();
            hideAddModal();
            selectTerminal(newTerm.id);
        }

        function showRenameModal(id) {
            const term = terminals.find(t => t.id === id);
            document.getElementById('rename-input').value = term.name;
            document.getElementById('rename-modal').classList.add('show');
        }
        function hideRenameModal() { document.getElementById('rename-modal').classList.remove('show'); }

        function confirmRename() {
            const newName = document.getElementById('rename-input').value.trim();
            if (!newName) return;
            const term = terminals.find(t => t.id === currentContextId);
            term.name = newName;
            saveTerminals();
            renderList();
            hideRenameModal();
        }

        function showDeleteModal(id) {
            document.getElementById('delete-modal').classList.add('show');
        }
        function hideDeleteModal() { document.getElementById('delete-modal').classList.remove('show'); }

        function confirmDelete() {
            terminals = terminals.filter(t => t.id !== currentContextId);
            saveTerminals();
            renderList();
            if (activeId === currentContextId) goHome();
            hideDeleteModal();
        }

        function showCreateWorkspaceModal() { document.getElementById('create-ws-modal').classList.add('show'); }
        function hideCreateWorkspaceModal() { document.getElementById('create-ws-modal').classList.remove('show'); }

        function confirmCreateWorkspace() {
            const name = document.getElementById('ws-name-input').value.trim();
            if (!name) return;
            const newWs = { id: Date.now().toString(), name };
            workspaces.unshift(newWs);
            saveWorkspaces();
            populateWorkspaceDropdown();
            hideCreateWorkspaceModal();
        }

        function populateWorkspaceDropdown() {
            const select = document.getElementById('workspace-dropdown');
            select.innerHTML = '<option value="all">All Workspaces</option>';
            workspaces.forEach(ws => {
                const opt = document.createElement('option');
                opt.value = ws.id;
                opt.textContent = ws.name;
                select.appendChild(opt);
            });
            select.value = currentWorkspaceId;
        }

        function populateWorkspaceSelects() {
            const select = document.getElementById('modal-workspace');
            select.innerHTML = '';
            workspaces.forEach(ws => {
                const opt = document.createElement('option');
                opt.value = ws.id;
                opt.textContent = ws.name;
                select.appendChild(opt);
            });
        }

        async function loadUser() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) throw new Error();
                const data = await res.json();
                currentUser = data.user;
                document.getElementById('username-display').textContent = currentUser.username;
                document.getElementById('credits-badge').textContent = `${currentUser.credits} CREDITS`;
            } catch (e) {
                window.location.href = '/auth.html';
            }
        }

        async function handleLogout() {
            if (confirm('Logout from KS SSH?')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/auth.html';
            }
        }

        document.getElementById('workspace-dropdown').onchange = (e) => {
            currentWorkspaceId = e.target.value;
            renderList();
        };

        window.onload = async () => {
            loadTerminals();
            loadWorkspaces();
            if (workspaces.length === 0) {
                workspaces.push({ id: 'default-ws', name: 'Default Workspace' });
                saveWorkspaces();
            }
            await loadUser();
            populateWorkspaceDropdown();
            renderList();
        };
    </script>
</body>
</html>
