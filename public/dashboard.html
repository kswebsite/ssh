<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --primary-blue: #3b82f6;
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.95);
            --border-blue: rgba(59, 130, 246, 0.2);
            --slate-900: #0f172a;
            --slate-700: #334155;
            --emerald-400: #34d399;
            --blue-600: #2563eb;
        }

        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* Top Bar - perfectly balanced for mobile & desktop */
        .top-bar {
            height: 56px;
            background: #0f172a;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 1px 0 rgba(59, 130, 246, 0.1);
        }

        @media (min-width: 768px) {
            .top-bar {
                padding: 0 24px;
                height: 64px;
            }
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* Workspaces section - clean, same line, responsive */
        .workspaces-section {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 420px;
        }

        .form-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            padding: 9px 12px;
            color: white;
            font-size: 13px;
            outline: none;
            flex: 1;
            min-width: 0;
        }

        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .action-btn-small {
            padding: 9px 14px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 6px;
            color: #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            min-width: 42px;
            flex-shrink: 0;
        }

        .action-btn-small:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        /* Credits badge */
        .credits-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 4px;
            font-size: 13px;
            color: #60a5fa;
            font-weight: 600;
            white-space: nowrap;
        }

        .credits-badge .dot {
            width: 6px;
            height: 6px;
            background: #60a5fa;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Add button */
        .btn-primary {
            background: #3b82f6;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        /* Content Area */
        .content {
            padding: 16px 16px 24px;
            overflow-y: auto;
            height: calc(100dvh - 56px);
        }

        @media (min-width: 768px) {
            .content {
                padding: 24px;
                height: calc(100dvh - 64px);
            }
        }

        /* Section Cards - always visible, stylish glass panels */
        .section-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.3);
        }

        .section-header {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e2e8f0;
        }

        .section-header::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #3b82f6;
            border-radius: 50%;
        }

        /* Mini grid inside each section */
        .mini-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 12px;
        }

        @media (min-width: 640px) {
            .mini-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .mini-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Mini terminal cards - compact but same style */
        .mini-card {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 8px;
            padding: 14px;
            transition: all 0.2s ease;
        }

        .mini-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -6px rgba(59, 130, 246, 0.3);
        }

        .mini-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .mini-title {
            font-weight: 600;
            font-size: 14px;
        }

        .mini-status {
            color: #34d399;
            font-size: 16px;
            line-height: 1;
        }

        .mini-token {
            background: #0f172a;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: #93c5fd;
            word-break: break-all;
            margin-bottom: 12px;
        }

        .mini-connect {
            width: 100%;
            padding: 8px;
            background: #3b82f6;
            border-radius: 6px;
            border: none;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .mini-connect:hover {
            background: #2563eb;
        }

        /* Empty state inside sections */
        .section-empty {
            text-align: center;
            padding: 32px 20px;
            color: #64748b;
            font-size: 13px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 9999;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 380px;
            padding: 24px;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: #64748b;
            font-size: 24px;
            cursor: pointer;
        }

        .input-field {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .input-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 24px;
        }

        .btn-flex {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 2px; }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="top-bar-left">
        <div class="workspaces-section">
            <select id="workspace-dropdown" class="form-input"></select>
            <button onclick="showCreateWorkspaceModal()" class="action-btn-small">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="top-bar-right">
        <div class="credits-badge">
            <div class="dot"></div>
            <span id="header-credits">0</span>
        </div>
        <button onclick="showAddModal()" class="btn-primary">
            <span style="font-size: 18px; line-height: 1;">+</span>
            <span>Add Terminal</span>
        </button>
    </div>
</div>

<!-- CONTENT - three always-visible stylish cards -->
<div class="content">

    <!-- Recents Card -->
    <div class="section-card">
        <div class="section-header">Recents</div>
        <div id="recents-grid" class="mini-grid"></div>
        <div id="recents-empty" class="section-empty" style="display: none;">No recent terminals yet</div>
    </div>

    <!-- Favorites Card -->
    <div class="section-card">
        <div class="section-header">Favorites</div>
        <div id="favorites-grid" class="mini-grid"></div>
        <div id="favorites-empty" class="section-empty" style="display: none;">No favorites yet</div>
    </div>

    <!-- All Terminals Card -->
    <div class="section-card">
        <div class="section-header">All Terminals</div>
        <div id="all-grid" class="mini-grid"></div>
        <div id="all-empty" class="section-empty" style="display: none;">No terminals in this workspace</div>
    </div>

</div>

<!-- ADD TERMINAL MODAL -->
<div id="add-modal" onclick="if(event.target.id==='add-modal')hideAddModal()" class="modal-overlay">
    <div onclick="event.stopPropagation()" class="modal">
        <div class="modal-header">
            <h2 class="modal-title">New Terminal</h2>
            <button onclick="hideAddModal()" class="modal-close">×</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 16px;">
            <input id="modal-name" placeholder="Display Name" class="input-field">
            <input id="modal-token" placeholder="Token (from KS Panel)" class="input-field input-mono">
        </div>
        <div class="modal-actions">
            <button onclick="hideAddModal()" class="btn-flex btn-secondary">Cancel</button>
            <button onclick="handleAddTerminal()" class="btn-flex btn-primary">Add Terminal</button>
        </div>
    </div>
</div>

<!-- CREATE WORKSPACE MODAL -->
<div id="create-ws-modal" onclick="if(event.target.id==='create-ws-modal')hideCreateWorkspaceModal()" class="modal-overlay">
    <div onclick="event.stopPropagation()" class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Create New Workspace</h2>
            <button onclick="hideCreateWorkspaceModal()" class="modal-close">×</button>
        </div>
        <input id="ws-name-input" placeholder="Workspace name (e.g. prod-ws)" class="input-field">
        <div class="modal-actions">
            <button onclick="hideCreateWorkspaceModal()" class="btn-flex btn-secondary">Cancel</button>
            <button onclick="confirmCreateWorkspace()" class="btn-flex btn-primary">Create Workspace</button>
        </div>
    </div>
</div>

<script>
    let terminals = [];
    let workspaces = [];
    let currentWorkspaceId = null;

    function loadTerminals() {
        const saved = localStorage.getItem('ks_ssh_terminals');
        terminals = saved ? JSON.parse(saved) : [];
    }

    function loadWorkspaces() {
        const saved = localStorage.getItem('ks_ssh_workspaces');
        workspaces = saved ? JSON.parse(saved) : [];
    }

    function saveTerminals() {
        localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
    }

    function saveWorkspaces() {
        localStorage.setItem('ks_ssh_workspaces', JSON.stringify(workspaces));
    }

    function populateWorkspaceDropdown() {
        const select = document.getElementById('workspace-dropdown');
        select.innerHTML = '';
        
        workspaces.forEach(ws => {
            const opt = document.createElement('option');
            opt.value = ws.id;
            opt.textContent = ws.name;
            if (ws.id === currentWorkspaceId) opt.selected = true;
            select.appendChild(opt);
        });

        if (workspaces.length > 0 && (!currentWorkspaceId || currentWorkspaceId === 'all')) {
            currentWorkspaceId = workspaces[0].id;
            select.value = currentWorkspaceId;
        }
    }

    function getRecents() {
        let filtered = terminals.filter(t => t.workspaceId === currentWorkspaceId);
        filtered.sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
        return filtered.slice(0, 8);
    }

    function getFavorites() {
        // For now showing all terminals (you can add isFavorite flag later)
        return terminals.filter(t => t.workspaceId === currentWorkspaceId);
    }

    function getAllTerminals() {
        return terminals.filter(t => t.workspaceId === currentWorkspaceId);
    }

    function renderMiniGrid(gridId, emptyId, data) {
        const grid = document.getElementById(gridId);
        const emptyEl = document.getElementById(emptyId);
        grid.innerHTML = '';

        if (data.length === 0) {
            emptyEl.style.display = 'block';
            return;
        }

        emptyEl.style.display = 'none';

        data.forEach(term => {
            const card = document.createElement('div');
            card.className = "mini-card";
            card.innerHTML = `
                <div class="mini-header">
                    <div class="mini-title">${term.name}</div>
                    <div class="mini-status">●</div>
                </div>
                <div class="mini-token">${term.token}</div>
                <button onclick="connectTerminal('${term.id}'); event.stopImmediatePropagation();" class="mini-connect">Connect Now</button>
            `;
            grid.appendChild(card);
        });
    }

    function renderAllSections() {
        const recents = getRecents();
        const favorites = getFavorites();
        const allTerms = getAllTerminals();

        renderMiniGrid('recents-grid', 'recents-empty', recents);
        renderMiniGrid('favorites-grid', 'favorites-empty', favorites);
        renderMiniGrid('all-grid', 'all-empty', allTerms);
    }

    function showAddModal() {
        document.getElementById('modal-name').value = '';
        document.getElementById('modal-token').value = '';
        document.getElementById('add-modal').classList.add('visible');
    }

    function hideAddModal() {
        document.getElementById('add-modal').classList.remove('visible');
    }

    function handleAddTerminal() {
        const name = document.getElementById('modal-name').value.trim();
        const token = document.getElementById('modal-token').value.trim();

        if (!token) {
            alert('Token is required');
            return;
        }

        const newTerm = {
            id: Date.now().toString(),
            name: name || `Terminal ${terminals.length + 1}`,
            token: token,
            workspaceId: currentWorkspaceId,
            added: Date.now(),
            lastUsed: Date.now()
        };

        terminals.unshift(newTerm);
        saveTerminals();
        hideAddModal();
        renderAllSections();
    }

    function connectTerminal(id) {
        const term = terminals.find(t => t.id === id);
        if (term) {
            term.lastUsed = Date.now();
            saveTerminals();
            console.log('%c✅ Connecting to terminal: ' + term.name, 'color:#60a5fa; font-weight:bold');
            alert('Connecting to: ' + term.name + '\n\n(Token: ' + term.token + ')');
            renderAllSections();
        }
    }

    function showCreateWorkspaceModal() {
        document.getElementById('ws-name-input').value = '';
        document.getElementById('create-ws-modal').classList.add('visible');
    }

    function hideCreateWorkspaceModal() {
        document.getElementById('create-ws-modal').classList.remove('visible');
    }

    function confirmCreateWorkspace() {
        const name = document.getElementById('ws-name-input').value.trim();
        if (!name) {
            alert('Workspace name is required');
            return;
        }
        const newWs = {
            id: Date.now().toString(),
            name: name,
            created: Date.now()
        };
        workspaces.unshift(newWs);
        saveWorkspaces();
        populateWorkspaceDropdown();
        hideCreateWorkspaceModal();
        currentWorkspaceId = newWs.id;
        renderAllSections();
    }

    function init() {
        loadTerminals();
        loadWorkspaces();
        populateWorkspaceDropdown();

        const savedWs = localStorage.getItem('ks_current_workspace');
        if (savedWs && workspaces.some(w => w.id === savedWs)) {
            currentWorkspaceId = savedWs;
            document.getElementById('workspace-dropdown').value = savedWs;
        }

        document.getElementById('workspace-dropdown').addEventListener('change', function() {
            currentWorkspaceId = this.value;
            localStorage.setItem('ks_current_workspace', currentWorkspaceId);
            renderAllSections();
        });

        renderAllSections();
    }

    window.onload = init;
</script>

</body>
</html>
