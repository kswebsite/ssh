<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard • KS SSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --primary-blue: #3b82f6;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: #020617;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -10px rgb(59 130 246 / 0.25);
        }

        .btn-primary {
            background: #3b82f6;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: scale(1.03);
        }

        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.95) translateY(12px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .top-bar {
            background: #0f172a;
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-white">

<!-- STYLISH TOP BAR (matches your sidebar design) -->
<div class="top-bar h-14 px-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <!-- Mobile hamburger (visible when used inside iframe) -->
        <button onclick="window.parent && window.parent.toggleSidebar && window.parent.toggleSidebar()" 
                class="md:hidden w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-800 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>

        <div class="flex items-center gap-2">
            <div class="flex items-center justify-center w-8 h-8 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-600/30">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter">Dashboard</h1>
        </div>
    </div>

    <!-- Add Button -->
    <button onclick="showAddModal()" 
            class="btn-primary flex items-center gap-2 px-5 py-2 text-sm font-medium">
        <span class="text-lg leading-none">+</span>
        <span>Add Terminal</span>
    </button>
</div>

<!-- MAIN CONTENT -->
<div class="p-6 overflow-y-auto h-[calc(100dvh-56px)]">
    <div id="terminals-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

    <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
        <div class="w-16 h-16 mx-auto mb-6 rounded-3xl bg-slate-900 flex items-center justify-center text-4xl">📡</div>
        <h3 class="text-2xl font-semibold mb-2">No terminals yet</h3>
        <p class="text-slate-400 mb-8 max-w-xs">Add your first terminal to get started with lightning-fast SSH connections.</p>
        <button onclick="showAddModal()" class="btn-primary px-8 py-3 text-base">Add Your First Terminal</button>
    </div>
</div>

<!-- ADD MODAL -->
<div id="add-modal" onclick="if(event.target.id==='add-modal')hideAddModal()" 
     class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    
    <div onclick="event.stopPropagation()" 
         class="modal glass-panel w-full max-w-sm p-6 rounded-2xl">
        
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">New Terminal</h2>
            <button onclick="hideAddModal()" class="text-3xl text-slate-400 hover:text-white leading-none">×</button>
        </div>

        <div class="space-y-5">
            <div>
                <label class="text-xs uppercase tracking-widest text-blue-400 font-medium block mb-1.5">Display Name</label>
                <input id="modal-name" 
                       placeholder="My Production Server"
                       class="w-full bg-slate-900 border border-blue-900/40 px-4 py-3.5 rounded-xl outline-none focus:border-blue-500 text-white">
            </div>
            
            <div>
                <label class="text-xs uppercase tracking-widest text-blue-400 font-medium block mb-1.5">Token</label>
                <input id="modal-token" 
                       placeholder="abc123-def456-ghi789"
                       class="w-full bg-slate-900 border border-blue-900/40 px-4 py-3.5 rounded-xl outline-none font-mono focus:border-blue-500 text-blue-300">
                <p class="text-[10px] text-slate-500 mt-2 flex items-center gap-1">
                    <span class="inline-block w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                    Get this from your KS Panel
                </p>
            </div>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="hideAddModal()" 
                    class="flex-1 py-3.5 border border-slate-700 rounded-xl font-medium text-slate-300 hover:bg-slate-900">
                Cancel
            </button>
            <button onclick="handleAddTerminal()" 
                    class="flex-1 py-3.5 btn-primary font-medium">
                Add Terminal
            </button>
        </div>
    </div>
</div>

<script>
    let terminals = [];

    function loadTerminals() {
        const saved = localStorage.getItem('ks_ssh_terminals');
        terminals = saved ? JSON.parse(saved) : [];
    }

    function saveTerminals() {
        localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
        
        // 🔥 IMPORTANT: Notify parent (main app with sidebar) that data changed
        if (window.parent) {
            window.parent.postMessage({
                type: 'terminals-updated',
                terminals: terminals
            }, '*');
        }
    }

    function renderCards() {
        const grid = document.getElementById('terminals-grid');
        const empty = document.getElementById('empty-state');
        
        grid.innerHTML = '';

        if (terminals.length === 0) {
            empty.classList.remove('hidden');
            return;
        }

        empty.classList.add('hidden');

        terminals.forEach(term => {
            const card = document.createElement('div');
            card.className = "card glass-panel p-5 rounded-2xl flex flex-col gap-4 cursor-pointer";
            
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="font-semibold text-lg">${term.name}</div>
                        <div class="text-xs text-emerald-400 flex items-center gap-1 mt-1">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                            </span>
                            ONLINE
                        </div>
                    </div>
                    <div class="text-xs font-mono bg-slate-900 px-3 py-1 rounded-lg text-blue-300">${term.token}</div>
                </div>

                <button onclick="event.stopImmediatePropagation(); connectTerminal('${term.id}');" 
                        class="mt-auto w-full py-3 btn-primary text-sm font-medium rounded-xl">
                    Connect Now
                </button>
            `;

            // Click anywhere on card (except button) to connect
            card.addEventListener('click', (e) => {
                if (!e.target.closest('button')) {
                    connectTerminal(term.id);
                }
            });

            grid.appendChild(card);
        });
    }

    function showAddModal() {
        document.getElementById('modal-name').value = '';
        document.getElementById('modal-token').value = '';
        document.getElementById('add-modal').classList.remove('hidden');
        document.getElementById('add-modal').classList.add('flex');
    }

    function hideAddModal() {
        const modal = document.getElementById('add-modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function handleAddTerminal() {
        const name = document.getElementById('modal-name').value.trim();
        const token = document.getElementById('modal-token').value.trim();

        if (!token) {
            alert('Token is required!');
            return;
        }

        // Prevent duplicate tokens
        if (terminals.some(t => t.token === token)) {
            alert('This token is already added!');
            return;
        }

        const newTerm = {
            id: Date.now().toString(),
            name: name || `Terminal ${terminals.length + 1}`,
            token: token,
            added: Date.now()
        };

        terminals.unshift(newTerm);
        saveTerminals();
        hideAddModal();
        renderCards();
    }

    function connectTerminal(id) {
        // This will be handled by the parent window (main app)
        if (window.parent) {
            window.parent.postMessage({
                type: 'connect-terminal',
                id: id
            }, '*');
        } else {
            // Fallback if opened directly
            console.log('Connect to terminal:', id);
            alert('Terminal opened in main window (iframe mode)');
        }
    }

    function initDashboard() {
        loadTerminals();
        renderCards();
        
        // Listen for updates from parent (in case sidebar adds a terminal)
        window.addEventListener('message', function(e) {
            if (e.data.type === 'refresh-dashboard') {
                loadTerminals();
                renderCards();
            }
        });
    }

    window.onload = initDashboard;
</script>

</body>
</html>
