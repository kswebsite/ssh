<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS SSH — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --primary-blue: #3b82f6;
        }
        
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: #020617;
            font-family: 'Inter', sans-serif;
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 30px -10px rgb(59 130 246 / 0.15);
        }
        
        .token-blur {
            filter: blur(6px);
            transition: filter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
        }
        
        .token-revealed {
            filter: blur(0);
        }
        
        .btn-primary {
            background: #3b82f6;
            border-radius: 9999px;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background: #2563eb;
            transform: scale(1.05);
        }
        
        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-[#020617] text-white">
    
    <!-- MINIMAL TOP BAR - ONLY NAME IN TOP RIGHT (no full header) -->
    <div class="h-14 bg-transparent px-6 flex items-center justify-end border-b border-blue-900/20">
        <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-7 h-7 bg-blue-600 rounded-2xl shadow-inner">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter">KS SSH</h1>
        </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 p-6 md:p-8 overflow-y-auto">
        <div class="max-w-screen-2xl mx-auto">
            
            <!-- Title + Add Button -->
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-4">
                    <h2 class="text-3xl font-semibold tracking-tight">Your Terminals</h2>
                    <span id="terminal-count-badge" 
                          class="px-4 py-1 text-xs font-mono bg-emerald-400/10 text-emerald-400 rounded-3xl">0</span>
                </div>
                
                <button onclick="showAddModal()" 
                        class="btn-primary flex items-center gap-2 px-7 py-3 text-white font-medium text-sm">
                    <span class="text-2xl leading-none mt-px">+</span>
                    <span>New Terminal</span>
                </button>
            </div>

            <!-- TERMINALS GRID -->
            <div id="terminals-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
                <!-- Populated by JS -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
                <div class="w-24 h-24 mx-auto mb-8 rounded-3xl bg-blue-500/10 flex items-center justify-center border border-blue-400/20">
                    <svg class="w-14 h-14 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2"/>
                    </svg>
                </div>
                <h3 class="text-2xl font-semibold mb-3">No terminals added yet</h3>
                <p class="text-slate-400 max-w-md mb-8">Add your first KS SSH terminal below. Everything is saved locally and synced with the sidebar.</p>
                <button onclick="showAddModal()" 
                        class="btn-primary flex items-center gap-3 px-10 py-4 text-lg">
                    <span class="text-3xl leading-none">+</span>
                    <span>Add First Terminal</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ADD TERMINAL MODAL -->
    <div onclick="if(event.target.id === 'add-modal') hideAddModal()" 
         id="add-modal"
         class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[9999] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal glass-panel w-full max-w-md rounded-3xl p-8 shadow-2xl">
            
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Add New Terminal</h2>
                <button onclick="hideAddModal()" class="text-4xl leading-none text-slate-400 hover:text-white">×</button>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold tracking-widest text-blue-400 mb-2">DISPLAY NAME</label>
                    <input id="modal-name" 
                           type="text" 
                           placeholder="My Production Server"
                           class="w-full bg-slate-900 border border-blue-900/50 focus:border-blue-500 rounded-2xl px-5 py-4 text-white placeholder-slate-400 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-semibold tracking-widest text-blue-400 mb-2">TOKEN</label>
                    <input id="modal-token" 
                           type="text" 
                           placeholder="abc123-def456-ghij789"
                           class="w-full bg-slate-900 border border-blue-900/50 focus:border-blue-500 rounded-2xl px-5 py-4 font-mono text-blue-300 placeholder-slate-500 outline-none">
                </div>
            </div>

            <div class="flex gap-3 mt-10">
                <button onclick="hideAddModal()" 
                        class="flex-1 py-4 text-slate-300 hover:bg-slate-800 rounded-2xl border border-slate-700 font-medium">CANCEL</button>
                <button onclick="handleAddTerminal()" 
                        class="flex-1 py-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-2xl">ADD TERMINAL</button>
            </div>
        </div>
    </div>

    <script>
        // ============== GLOBAL STATE ==============
        let terminals = [];

        // ============== LOCALSTORAGE SYNC (exact same key as index.html) ==============
        function loadTerminals() {
            const saved = localStorage.getItem('ks_ssh_terminals');
            terminals = saved ? JSON.parse(saved) : [];
        }

        function saveTerminals() {
            localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
            
            // Sync sidebar in parent window instantly
            if (window.parent && typeof window.parent.renderList === 'function') {
                window.parent.renderList();
            }
        }

        // ============== RENDER CARDS ==============
        function renderCards() {
            const grid = document.getElementById('terminals-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '';

            document.getElementById('terminal-count-badge').textContent = terminals.length;

            if (terminals.length === 0) {
                empty.classList.remove('hidden');
                grid.classList.add('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.classList.remove('hidden');

            terminals.forEach(term => {
                const card = document.createElement('div');
                card.className = `card glass-panel rounded-3xl p-6 flex flex-col cursor-pointer`;
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl flex items-center justify-center">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <div class="font-semibold text-xl">${term.name}</div>
                        </div>
                        <div class="text-emerald-400 text-xs font-bold flex items-center gap-1">
                            <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                            ONLINE
                        </div>
                    </div>

                    <!-- Token -->
                    <div class="mb-8">
                        <div class="text-xs uppercase font-semibold text-blue-400 mb-2 flex justify-between items-center">
                            TOKEN
                            <span onclick="copyToken('${term.id}', '${term.token}'); event.stopImmediatePropagation();" class="text-[10px] bg-blue-500/10 hover:bg-blue-500/20 px-3 py-px rounded-xl cursor-pointer">COPY</span>
                        </div>
                        <div onclick="copyToken('${term.id}', '${term.token}');" 
                             class="bg-slate-900 border border-blue-900/30 rounded-2xl p-4 font-mono text-blue-300 text-sm flex items-center gap-3 cursor-pointer hover:border-blue-400/50">
                            <span id="token-${term.id}" class="token-blur flex-1 break-all">${term.token}</span>
                            <span class="text-xl">📋</span>
                        </div>
                    </div>

                    <!-- Connect Button -->
                    <button onclick="connectTerminal('${term.id}'); event.stopImmediatePropagation();" 
                            class="mt-auto w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-3xl font-semibold flex items-center justify-center gap-2 text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                        </svg>
                        CONNECT
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        // ============== COPY TOKEN + REVEAL ==============
        window.copyToken = function(id, token) {
            navigator.clipboard.writeText(token).then(() => {
                const el = document.getElementById(`token-${id}`);
                if (el) {
                    el.classList.remove('token-blur');
                    el.classList.add('token-revealed');
                    el.style.color = '#10b981';
                    setTimeout(() => el.style.color = '', 1200);
                }
                showToast('Token copied!');
            });
        };

        // ============== CONNECT (calls parent index.html) ==============
        window.connectTerminal = function(id) {
            hideAddModal();
            if (window.parent && typeof window.parent.selectTerminal === 'function') {
                window.parent.selectTerminal(id);
            }
        };

        // ============== ADD MODAL ==============
        window.showAddModal = function() {
            document.getElementById('modal-name').value = '';
            document.getElementById('modal-token').value = '';
            const modal = document.getElementById('add-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        window.hideAddModal = function() {
            const modal = document.getElementById('add-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        window.handleAddTerminal = function() {
            const name = document.getElementById('modal-name').value.trim();
            const token = document.getElementById('modal-token').value.trim();

            if (!token) {
                alert('Token is required');
                return;
            }
            if (terminals.some(t => t.token === token)) {
                alert('This token already exists!');
                return;
            }

            const newTerm = {
                id: Date.now().toString(),
                name: name || `Terminal ${terminals.length + 1}`,
                token: token,
                added: Date.now()
            };

            terminals.unshift(newTerm);
            saveTerminals();
            hideAddModal();
            renderCards();

            // Auto open in parent after adding
            setTimeout(() => {
                if (window.parent && typeof window.parent.selectTerminal === 'function') {
                    window.parent.selectTerminal(newTerm.id);
                }
            }, 400);
        };

        // ============== TOAST ==============
        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText = `position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#0f172a; border:1px solid #3b82f6; color:white; padding:12px 24px; border-radius:9999px; white-space:nowrap; z-index:99999; box-shadow:0 10px 15px -3px rgb(59 130 246);`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        // ============== INIT ==============
        function init() {
            loadTerminals();
            renderCards();

            // Listen for changes from parent (sidebar)
            window.addEventListener('storage', (e) => {
                if (e.key === 'ks_ssh_terminals') {
                    loadTerminals();
                    renderCards();
                }
            });

            console.log('%c✅ KS SSH Dashboard synced with sidebar', 'color:#3b82f6;font-family:monospace');
        }

        window.onload = init;
    </script>
</body>
</html>
