<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --primary-blue: #3b82f6;
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.9);
            --border-blue: rgba(59, 130, 246, 0.15);
            --slate-900: #0f172a;
            --slate-700: #334155;
            --emerald-400: #34d399;
            --blue-600: #2563eb;
        }

        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* Top Bar */
        .top-bar {
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            border-bottom: 1px solid rgba(30, 58, 138, 0.2);
        }

        /* Content Area */
        .content {
            padding: 24px;
            overflow-y: auto;
            height: calc(100dvh - 56px);
        }

        /* Grid System */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1280px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Empty State */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 96px 0;
            text-align: center;
        }

        .empty-state.visible {
            display: flex;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Glass Panel */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-blue);
        }

        /* Card */
        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-blue);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(59, 130, 246, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-weight: 500;
        }

        .status-dot {
            font-size: 0.75rem;
            color: var(--emerald-400);
        }

        .token-display {
            background: var(--slate-900);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary-blue);
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: var(--blue-600);
            transform: scale(1.04);
        }

        .btn-add {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            font-size: 0.875rem;
        }

        .btn-add span:first-child {
            font-size: 1.125rem;
        }

        .btn-connect {
            margin-top: auto;
            padding: 8px 0;
            font-size: 0.875rem;
        }

        .btn-large {
            padding: 12px 24px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 50;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            animation: modalPop 0.25s ease;
            width: 100%;
            max-width: 384px;
            padding: 24px;
            border-radius: 8px;
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.95) translateY(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-field {
            width: 100%;
            background: var(--slate-900);
            border: 1px solid rgba(30, 58, 138, 0.4);
            padding: 12px 16px;
            border-radius: 6px;
            color: white;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary-blue);
        }

        .input-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 24px;
        }

        .btn-flex {
            flex: 1;
            padding: 12px 0;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--slate-700);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 0.875rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 2px;
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <button onclick="showAddModal()" class="btn-primary btn-add">
        <span>+</span>
        <span>Add</span>
    </button>
</div>

<!-- CONTENT -->
<div class="content">
    <div id="terminals-grid" class="grid-container"></div>

    <div id="empty-state" class="empty-state">
        <h3>No terminals</h3>
        <button onclick="showAddModal()" class="btn-primary btn-large">Add Terminal</button>
    </div>
</div>

<!-- MODAL -->
<div id="add-modal" onclick="if(event.target.id==='add-modal')hideAddModal()" class="modal-overlay">
    
    <div onclick="event.stopPropagation()" class="modal glass-panel">
        
        <div class="modal-header">
            <h2 class="modal-title">New Terminal</h2>
            <button onclick="hideAddModal()" class="modal-close">×</button>
        </div>

        <div class="form-group">
            <input id="modal-name" placeholder="Name" class="input-field">
            
            <input id="modal-token" placeholder="Token" class="input-field input-mono">
        </div>

        <div class="modal-actions">
            <button onclick="hideAddModal()" class="btn-secondary btn-flex">Cancel</button>
            <button onclick="handleAddTerminal()" class="btn-primary btn-flex">Add</button>
        </div>
    </div>
</div>

<script>
let terminals = [];

function loadTerminals() {
    const saved = localStorage.getItem('ks_ssh_terminals');
    terminals = saved ? JSON.parse(saved) : [];
}

function saveTerminals() {
    localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
}

function renderCards() {
    const grid = document.getElementById('terminals-grid');
    const empty = document.getElementById('empty-state');
    grid.innerHTML = '';

    if (terminals.length === 0) {
        empty.classList.add('visible');
        return;
    }

    empty.classList.remove('visible');

    terminals.forEach(term => {
        const card = document.createElement('div');
        card.className = "card";

        card.innerHTML = `
            <div class="card-header">
                <div class="card-title">${term.name}</div>
                <div class="status-dot">●</div>
            </div>

            <div class="token-display">
                ${term.token}
            </div>

            <button onclick="connectTerminal('${term.id}')" class="btn-primary btn-connect">
                Connect
            </button>
        `;

        grid.appendChild(card);
    });
}

function showAddModal() {
    document.getElementById('add-modal').classList.add('visible');
}

function hideAddModal() {
    document.getElementById('add-modal').classList.remove('visible');
}

function handleAddTerminal() {
    const name = document.getElementById('modal-name').value.trim();
    const token = document.getElementById('modal-token').value.trim();

    if (!token) return;

    const newTerm = {
        id: Date.now().toString(),
        name: name || `Terminal ${terminals.length + 1}`,
        token
    };

    terminals.unshift(newTerm);
    saveTerminals();
    hideAddModal();
    renderCards();
}

function connectTerminal(id) {
    console.log("connect:", id);
}

function init() {
    loadTerminals();
    renderCards();
}

window.onload = init;
</script>

</body>
</html>
