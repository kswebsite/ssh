<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KS SSH - Auth</title>
  <link rel="stylesheet" href="theme.css">
  <script src="ui.js"></script>
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #000;
    }

    .auth-panel {
      width: 100%;
      max-width: 380px;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
      background: #0a0a0a;
      border: 1px solid #1e293b;
      border-radius: 4px;
    }

    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-wrapper {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      color: white;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #fff;
      font-family: var(--font-mono);
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #000;
      padding: 2px;
      border-radius: 2px;
      margin-bottom: 1.25rem;
      border: 1px solid #1e293b;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    /* Forms */
    .form-container {
      display: none;
      animation: fadeIn 0.2s ease-out;
    }

    .form-container.visible {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .error-message {
      color: var(--danger);
      font-size: 13px;
      margin-top: 1rem;
      text-align: center;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    .terms-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="auth-panel card">
    <div class="header">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <h1 class="title">KS SSH ACCESS</h1>
      </div>
    </div>

    <div class="tabs">
      <button onclick="switchTab(0)" id="tab-login" class="tab-btn active">Login</button>
      <button onclick="switchTab(1)" id="tab-register" class="tab-btn">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="form-container visible">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email or Username</label>
          <input id="login-identifier" type="text" required class="input" placeholder="user@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="login-password" type="password" required class="input" placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Sign In
        </button>
      </form>
      <p id="login-error" class="error-message">Invalid credentials</p>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" class="form-container">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input id="reg-username" type="text" required class="input" placeholder="johndoe">
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="reg-email" type="email" required class="input" placeholder="john@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="reg-password" type="password" required class="input" placeholder="••••••••">
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input id="reg-confirm" type="password" required class="input" placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Create Account
        </button>
      </form>
      <p id="register-error" class="error-message">Registration failed</p>
    </div>
  </div>

  <script>
    function switchTab(n) {
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');

      if (n === 0) {
        loginForm.classList.add('visible');
        registerForm.classList.remove('visible');
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
      } else {
        loginForm.classList.remove('visible');
        registerForm.classList.add('visible');
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const errorEl = document.getElementById('login-error');
      errorEl.classList.remove('visible');

      const identifier = document.getElementById('login-identifier').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const errorEl = document.getElementById('register-error');
      errorEl.classList.remove('visible');

      const username = document.getElementById('reg-username').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-confirm').value;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, confirmPassword })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        await ui.alert('Account created! Please login.', 'Success');
        switchTab(0);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
      }
    }
  </script>
</body>
</html>
