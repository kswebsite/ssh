<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KS SSH - Auth</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Mesh */
    .bg-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: 
        radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(37, 99, 235, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
      animation: meshMove 20s ease-in-out infinite;
    }

    @keyframes meshMove {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    .auth-panel {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-wrapper {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .logo-icon svg {
      width: 36px;
      height: 36px;
      color: white;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: rgba(15, 23, 42, 0.4);
      padding: 4px;
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    /* Forms */
    .form-container {
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    .form-container.visible {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .error-message {
      color: var(--danger);
      font-size: 13px;
      margin-top: 1rem;
      text-align: center;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    .terms-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .terms-wrapper input {
      accent-color: var(--accent);
    }

    .link {
      color: var(--accent);
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  
  <div class="auth-panel card glass">
    <div class="header">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <h1 class="title">KS SSH ACCESS</h1>
      </div>
    </div>

    <div class="tabs">
      <button onclick="switchTab(0)" id="tab-login" class="tab-btn active">Login</button>
      <button onclick="switchTab(1)" id="tab-register" class="tab-btn">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="form-container visible">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email or Username</label>
          <input id="login-identifier" type="text" required class="input" placeholder="user@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="login-password" type="password" required class="input" placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Sign In
          <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
          </svg>
        </button>
      </form>
      <p id="login-error" class="error-message">Invalid credentials</p>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" class="form-container">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input id="reg-username" type="text" required class="input" placeholder="johndoe">
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="reg-email" type="email" required class="input" placeholder="john@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="reg-password" type="password" required class="input" placeholder="••••••••">
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input id="reg-confirm" type="password" required class="input" placeholder="••••••••">
        </div>

        <div class="terms-wrapper">
          <input type="checkbox" required id="terms">
          <span>I agree to the <a href="#" class="link">Terms</a></span>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
          Create Account
          <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </button>
      </form>
      <p id="register-error" class="error-message">Registration failed</p>
    </div>
  </div>

  <script>
    function switchTab(n) {
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');

      if (n === 0) {
        loginForm.classList.add('visible');
        registerForm.classList.remove('visible');
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
      } else {
        loginForm.classList.remove('visible');
        registerForm.classList.add('visible');
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const errorEl = document.getElementById('login-error');
      errorEl.classList.remove('visible');

      const identifier = document.getElementById('login-identifier').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const errorEl = document.getElementById('register-error');
      errorEl.classList.remove('visible');

      const username = document.getElementById('reg-username').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-confirm').value;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, confirmPassword })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        alert('Account created! Please login.');
        switchTab(0);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
      }
    }
  </script>
</body>
</html>
