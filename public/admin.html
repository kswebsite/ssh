<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <style>
        body { padding: 32px; background: #000; color: #fff; }
        .admin-container { max-width: 1200px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }

        .admin-tabs { display: flex; gap: 24px; border-bottom: 1px solid #1e293b; margin-bottom: 32px; }
        .admin-tab { padding: 12px 4px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; position: relative; }
        .admin-tab.active { color: var(--accent); }
        .admin-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .user-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .user-table th { text-align: left; padding: 12px 16px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .user-row { background: #0a0a0a; border: 1px solid #1e293b; transition: all 0.2s; }
        .user-row td { padding: 16px; font-size: 14px; border-top: 1px solid #1e293b; border-bottom: 1px solid #1e293b; }
        .user-row td:first-child { border-left: 1px solid #1e293b; border-radius: 8px 0 0 8px; }
        .user-row td:last-child { border-right: 1px solid #1e293b; border-radius: 0 8px 8px 0; }

        .config-form { max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
        .config-group { display: flex; flex-direction: column; gap: 8px; }
        .config-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="admin-container animate-slide-up">
        <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 32px; letter-spacing: -0.02em;">System Administration</h1>

        <div class="admin-tabs">
            <div class="admin-tab active" onclick="switchTab('users', event)">Users</div>
            <div class="admin-tab" onclick="switchTab('coupons', event)">Coupons</div>
            <div class="admin-tab" onclick="switchTab('videos', event)">Videos</div>
            <div class="admin-tab" onclick="switchTab('settings', event)">Settings</div>
        </div>

        <div id="tab-users" class="tab-content active">
            <div id="stat-users-container" class="stats-grid"><div class="card"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Total Users</div><div id="stat-users" style="font-size:24px;font-weight:700;">0</div></div></div>
            <table class="user-table"><thead><tr><th>User</th><th>Credits</th><th>Joined</th><th>Actions</th></tr></thead><tbody id="user-list"></tbody></table>
        </div>

        <div id="tab-coupons" class="tab-content">
            <div style="display:flex;justify-content:space-between;margin-bottom:24px;"><h2>Coupons</h2><button class="btn btn-primary" onclick="showCreateCoupon()">+ New Coupon</button></div>
            <table class="user-table"><thead><tr><th>Code</th><th>Reward</th><th>Usage</th><th>Actions</th></tr></thead><tbody id="coupon-list"></tbody></table>
        </div>

        <div id="tab-videos" class="tab-content">
            <div style="display:flex;justify-content:space-between;margin-bottom:24px;"><h2>Video Rewards</h2><button class="btn btn-primary" onclick="showCreateVideo()">+ Add Video</button></div>
            <table class="user-table"><thead><tr><th>Title</th><th>Reward</th><th>Duration</th><th>YouTube ID</th><th>Actions</th></tr></thead><tbody id="video-list"></tbody></table>
        </div>

        <div id="tab-settings" class="tab-content">
            <h2>System Config</h2>
            <div class="card config-form" id="settings-form">
                <div class="config-group"><label class="config-label">AFK Rate (Cr/Hr)</label><input id="cfg-afk_rate" class="input" type="number"></div>
                <div class="config-group"><label class="config-label">AFK Max Hours</label><input id="cfg-afk_max_hours" class="input" type="number"></div>
                <div class="config-group"><label class="config-label">Daily Video Max</label><input id="cfg-video_daily_max" class="input" type="number"></div>
                <div class="config-group"><label class="config-label">Video Cooldown (Hrs)</label><input id="cfg-video_cooldown_hours" class="input" type="number"></div>
                <button class="btn btn-primary" onclick="saveSettings()">Save Configuration</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab, e) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            if(tab === 'users') loadUsers();
            if(tab === 'coupons') loadCoupons();
            if(tab === 'videos') loadVideos();
            if(tab === 'settings') loadSettings();
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const data = await res.json();
            if (data.success) {
                document.getElementById('stat-users').textContent = data.users.length;
                document.getElementById('user-list').innerHTML = data.users.map(u => `<tr class="user-row"><td><b>${u.username}</b><br><small>${u.email}</small></td><td>${u.credits}</td><td>${new Date(u.created_at).toLocaleDateString()}</td><td><button class="btn btn-ghost" onclick="adjustCredits(${u.id}, ${u.credits})">Credits</button></td></tr>`).join('');
            }
        }

        async function loadCoupons() {
            const res = await fetch('/api/admin/coupons');
            const data = await res.json();
            document.getElementById('coupon-list').innerHTML = data.coupons.map(c => `<tr class="user-row"><td><code>${c.code}</code></td><td>${c.reward}</td><td>${c.current_uses}/${c.max_uses}</td><td><button class="btn btn-ghost" style="color:var(--danger);" onclick="deleteCoupon('${c.id}')">Delete</button></td></tr>`).join('');
        }

        async function loadVideos() {
            const res = await fetch('/api/admin/videos');
            const data = await res.json();
            document.getElementById('video-list').innerHTML = data.videos.map(v => `
                <tr class="user-row">
                    <td><b>${v.title}</b></td>
                    <td>${v.reward} Credits</td>
                    <td>${v.duration_seconds}s</td>
                    <td><code>${v.video_id}</code></td>
                    <td><button class="btn btn-ghost" style="color:var(--danger);" onclick="deleteVideo('${v.id}')">Delete</button></td>
                </tr>
            `).join('');
        }

        async function showCreateVideo() {
            const title = prompt('Video Title:');
            const video_id = prompt('YouTube Video ID:');
            const reward = prompt('Reward amount:');
            const duration = prompt('Duration in seconds:', '30');
            if(!title || !video_id || !reward) return;

            await fetch('/api/admin/videos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, video_id, reward: parseInt(reward), duration_seconds: parseInt(duration) })
            });
            loadVideos();
        }

        async function deleteVideo(id) {
            if(confirm('Delete video?')) {
                await fetch(`/api/admin/videos/${id}`, { method: 'DELETE' });
                loadVideos();
            }
        }

        async function showCreateCoupon() {
            const code = prompt('Code:');
            const reward = prompt('Reward:');
            const max = prompt('Max Uses:', '100');
            if(!code || !reward) return;
            await fetch('/api/admin/coupons', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ code, reward: parseInt(reward), max_uses: parseInt(max) })
            });
            loadCoupons();
        }

        async function deleteCoupon(id) {
            if(confirm('Delete coupon?')) { await fetch(`/api/admin/coupons/${id}`, { method: 'DELETE' }); loadCoupons(); }
        }

        async function loadSettings() {
            const res = await fetch('/api/admin/settings');
            const data = await res.json();
            Object.entries(data.settings).forEach(([k, v]) => {
                const el = document.getElementById(`cfg-${k}`);
                if(el) el.value = v;
            });
        }

        async function saveSettings() {
            const settings = {};
            ['afk_rate', 'afk_max_hours', 'video_daily_max', 'video_cooldown_hours'].forEach(k => {
                settings[k] = document.getElementById(`cfg-${k}`).value;
            });
            await fetch('/api/admin/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(settings)
            });
            alert('Saved!');
        }

        async function adjustCredits(id, curr) {
            const val = prompt('New Balance:', curr);
            if(val !== null) {
                await fetch(`/api/admin/users/${id}/credits`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ credits: parseInt(val) }) });
                loadUsers();
            }
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
