<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --primary-blue: #3b82f6;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: #020617;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        .card {
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgb(59 130 246 / 0.2);
        }

        .btn-primary {
            background: #3b82f6;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: scale(1.04);
        }

        .modal {
            animation: modalPop 0.25s ease;
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.95) translateY(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="text-white">

<!-- TOP BAR -->
<div class="h-14 px-6 flex items-center justify-end border-b border-blue-900/20">
    <button onclick="showAddModal()" 
            class="btn-primary flex items-center gap-2 px-5 py-2 text-sm font-medium">
        <span class="text-lg">+</span>
        <span>Add</span>
    </button>
</div>

<!-- CONTENT -->
<div class="p-6 overflow-y-auto h-[calc(100dvh-56px)]">
    <div id="terminals-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

    <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
        <h3 class="text-xl font-semibold mb-3">No terminals</h3>
        <button onclick="showAddModal()" class="btn-primary px-6 py-3">Add Terminal</button>
    </div>
</div>

<!-- MODAL -->
<div id="add-modal" onclick="if(event.target.id==='add-modal')hideAddModal()" 
     class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    
    <div onclick="event.stopPropagation()" 
         class="modal glass-panel w-full max-w-sm p-6 rounded-lg">
        
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-semibold">New Terminal</h2>
            <button onclick="hideAddModal()" class="text-xl">×</button>
        </div>

        <div class="space-y-4">
            <input id="modal-name" placeholder="Name"
                class="w-full bg-slate-900 border border-blue-900/40 px-4 py-3 rounded-md outline-none">
            
            <input id="modal-token" placeholder="Token"
                class="w-full bg-slate-900 border border-blue-900/40 px-4 py-3 rounded-md font-mono outline-none">
        </div>

        <div class="flex gap-2 mt-6">
            <button onclick="hideAddModal()" class="flex-1 py-3 border border-slate-700 rounded-md">Cancel</button>
            <button onclick="handleAddTerminal()" class="flex-1 py-3 btn-primary">Add</button>
        </div>
    </div>
</div>

<script>
let terminals = [];

function loadTerminals() {
    const saved = localStorage.getItem('ks_ssh_terminals');
    terminals = saved ? JSON.parse(saved) : [];
}

function saveTerminals() {
    localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
}

function renderCards() {
    const grid = document.getElementById('terminals-grid');
    const empty = document.getElementById('empty-state');
    grid.innerHTML = '';

    if (terminals.length === 0) {
        empty.classList.remove('hidden');
        return;
    }

    empty.classList.add('hidden');

    terminals.forEach(term => {
        const card = document.createElement('div');
        card.className = "card glass-panel p-5 rounded-lg flex flex-col gap-4";

        card.innerHTML = `
            <div class="flex justify-between items-center">
                <div class="font-medium">${term.name}</div>
                <div class="text-xs text-emerald-400">●</div>
            </div>

            <div class="bg-slate-900 px-3 py-2 rounded-md text-xs font-mono break-all">
                ${term.token}
            </div>

            <button onclick="connectTerminal('${term.id}')" 
                class="mt-auto py-2 btn-primary text-sm">
                Connect
            </button>
        `;

        grid.appendChild(card);
    });
}

function showAddModal() {
    document.getElementById('add-modal').classList.remove('hidden');
}

function hideAddModal() {
    document.getElementById('add-modal').classList.add('hidden');
}

function handleAddTerminal() {
    const name = document.getElementById('modal-name').value.trim();
    const token = document.getElementById('modal-token').value.trim();

    if (!token) return;

    const newTerm = {
        id: Date.now().toString(),
        name: name || `Terminal ${terminals.length + 1}`,
        token
    };

    terminals.unshift(newTerm);
    saveTerminals();
    hideAddModal();
    renderCards();
}

function connectTerminal(id) {
    console.log("connect:", id);
}

function init() {
    loadTerminals();
    renderCards();
}

window.onload = init;
</script>

</body>
</html>
