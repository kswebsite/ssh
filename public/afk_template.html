<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFK Earning</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <style>
        body { padding: 32px; background: #000; color: #fff; overflow: hidden; }
        .afk-container {
            max-width: 800px; margin: 60px auto; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .afk-status-card {
            background: #0a0a0a; border: 1px solid #1e293b; padding: 32px; border-radius: 4px;
            width: 100%; position: relative; overflow: hidden;
        }

        .pulse-ring {
            width: 80px; height: 80px; background: rgba(59, 130, 246, 0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; position: relative;
        }
        .pulse-ring::after {
            content: ''; position: absolute; inset: -4px; border: 2px solid var(--accent);
            border-radius: 50%; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 0.2; } 100% { transform: scale(1); opacity: 0.8; } }

        .ad-block-warning {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }

        .ad-container { margin-top: 32px; min-height: 250px; width: 100%; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <!-- Ad Blocker Detection element -->
    <div id="ad-detection-box" class="ad-container ads ad-banner" style="position: absolute; left: -9999px;">&nbsp;</div>

    <div id="blocker-overlay" class="ad-block-warning">
        <div style="background: rgba(239, 68, 68, 0.1); padding: 32px; border: 1px solid #ef4444; border-radius: 24px; max-width: 400px;">
            <svg style="width: 48px; height: 48px; color: #ef4444; margin-bottom: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 8px;">Ad Blocker Detected</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">To earn credits while AFK, you must disable your ad blocker. This helps keep our service free.</p>
            <button class="btn btn-primary" onclick="location.reload()" style="width: 100%;">I've Disabled It</button>
        </div>
    </div>

    <div class="afk-container animate-slide-up">
        <div class="afk-status-card">
            <div class="pulse-ring">
                <svg style="width: 48px; height: 48px; color: var(--accent);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <h1 style="font-size: 20px; font-weight: 800; margin-bottom: 8px; font-family: var(--font-mono); letter-spacing: 0.1em;">AFK_MODE_ACTIVE</h1>
            <p id="afk-msg" style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px; font-family: var(--font-mono);">STATUS: EARNING_CREDITS // SESSION: ACTIVE</p>

            <div style="display: flex; gap: 16px; justify-content: center;">
                <div class="card" style="padding: 16px 24px; min-width: 140px;">
                    <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;">Earned Today</div>
                    <div id="earned-session" style="font-size: 20px; font-weight: 700;">0</div>
                </div>
                <div class="card" style="padding: 16px 24px; min-width: 140px;">
                    <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;">Time Elapsed</div>
                    <div id="elapsed-time" style="font-size: 20px; font-weight: 700;">00:00</div>
                </div>
            </div>

            <div id="dynamic-ad-container" class="ad-container">
                <!-- AFK_AD_CODE -->
            </div>
        </div>
    </div>

    <script>
        let startTime = Date.now();
        let earned = 0;

        function checkAdBlocker() {
            const detectionBox = document.getElementById('ad-detection-box');
            if (!detectionBox || detectionBox.offsetHeight === 0 || window.getComputedStyle(detectionBox).display === 'none') {
                document.getElementById('blocker-overlay').style.display = 'flex';
                return true;
            }
            return false;
        }

        function updateStatus() {
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            const m = Math.floor(diff / 60);
            const s = diff % 60;
            document.getElementById('elapsed-time').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            // Check blocker periodically
            if (diff % 10 === 0) checkAdBlocker();
        }

        window.onload = () => {
            if (!checkAdBlocker()) {
                setInterval(updateStatus, 1000);
            }
        };

        // Adsterra/Generic code sometimes fails if script is blocked, so we can also check for global vars
        setTimeout(() => {
            if (typeof window.atob === 'undefined') { /* potential check if essential browser stuff is tampered? not reliable */ }
        }, 2000);
    </script>
</body>
</html>
