<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing & History</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <style>
        body { padding: 16px; background: #000; color: #fff; }
        .billing-container { max-width: 1000px; margin: 0 auto; }

        .history-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; margin-top: 20px; }
        .history-table th { text-align: left; padding: 8px 12px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-mono); }
        .history-row { background: #0a0a0a; border: 1px solid #1e293b; transition: all 0.1s; }
        .history-row td { padding: 10px 12px; font-size: 13px; border-top: 1px solid #1e293b; border-bottom: 1px solid #1e293b; }
        .history-row td:first-child { border-left: 1px solid #1e293b; border-radius: 2px 0 0 2px; }
        .history-row td:last-child { border-right: 1px solid #1e293b; border-radius: 0 2px 2px 0; }

        .amount-positive { color: #10b981; font-weight: 600; }
        .empty-state { text-align: center; padding: 64px 20px; color: var(--text-muted); border: 1px dashed #1e293b; border-radius: 12px; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="billing-container animate-slide-up">
        <h1 style="font-size: 20px; font-weight: 800; margin-bottom: 24px; letter-spacing: 0.05em; font-family: var(--font-mono);">BILLING_HISTORY</h1>

        <div class="card" style="margin-bottom: 40px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; font-family: var(--font-mono);">Available Balance</h2>
                    <p id="current-balance" style="font-size: 24px; font-weight: 700; font-family: var(--font-mono);">0 CREDITS</p>
                </div>
                <button class="btn btn-primary" onclick="window.parent.navigateTo('dashboard')">Earn More</button>
            </div>
        </div>

        <h2 style="font-size: 16px; margin-bottom: 16px;">Transaction History</h2>
        <table class="history-table" id="history-table" style="display: none;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type / Description</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="history-list"></tbody>
        </table>

        <div id="empty-history" class="empty-state">
            <p>No transactions found.</p>
        </div>
    </div>

    <script>
        async function loadBilling() {
            const userRes = await fetch('/api/me');
            const userData = await userRes.json();
            if (userData.success) {
                document.getElementById('current-balance').textContent = `${userData.user.credits} CREDITS`;
            }

            const historyRes = await fetch('/api/billing/history');
            const historyData = await historyRes.json();

            if (historyData.success && historyData.history.length > 0) {
                document.getElementById('history-table').style.display = 'table';
                document.getElementById('empty-history').style.display = 'none';

                const container = document.getElementById('history-list');
                container.innerHTML = historyData.history.map(item => {
                    let typeLabel = item.type;
                    if (item.type === 'video') typeLabel = '📺 Video Reward';
                    if (item.type === 'afk') typeLabel = '⌛ AFK Earning';
                    if (item.type.startsWith('Coupon')) typeLabel = '🎟️ ' + item.type;

                    return `
                        <tr class="history-row">
                            <td style="color: var(--text-muted); font-size: 12px;">${new Date(item.created_at).toLocaleString()}</td>
                            <td style="font-weight: 500;">${typeLabel}</td>
                            <td class="amount-positive">+${item.amount}</td>
                            <td><span class="badge badge-primary" style="font-size: 10px;">COMPLETED</span></td>
                        </tr>
                    `;
                }).join('');
            }
        }

        window.onload = loadBilling;
    </script>
</body>
</html>
