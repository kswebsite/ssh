<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS SSH — Web Terminal</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <script src="ui.js"></script>
    <style>
        body, html { height: 100dvh; width: 100%; overflow: hidden; background: #000; }
        .app { display: flex; height: 100vh; width: 100vw; }
        #sidebar {
            width: 240px; min-width: 240px; background: var(--bg-sidebar);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (max-width: 767px) {
            #sidebar {
                position: fixed; left: 0; top: 0; bottom: 0;
                transform: translateX(-100%);
                box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            }
            #sidebar.open { transform: translateX(0); }
        }
        .sidebar-header { padding: 16px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .logo {
            width: 28px; height: 28px; background: var(--accent); border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo svg { width: 20px; height: 20px; color: white; }
        .brand h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
        
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        .section-label {
            font-size: 10px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.1em; margin: 12px 8px 4px;
            font-family: var(--font-mono);
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 6px 10px;
            border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer;
            transition: all 0.2s ease; margin-bottom: 1px; font-size: 13px;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
        .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            box-shadow: inset 3px 0 0 var(--accent);
        }
        .nav-item svg { width: 18px; height: 18px; opacity: 0.7; }
        
        .terminal-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; margin-bottom: 1px;
            border: 1px solid transparent;
        }
        .terminal-item:hover { background: rgba(255, 255, 255, 0.03); border-color: var(--border); }
        .terminal-item:hover { background: rgba(255, 255, 255, 0.03); }
        .terminal-item.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); }
        .terminal-info { flex: 1; min-width: 0; }
        .terminal-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .terminal-token { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
        
        #main-content { flex: 1; display: flex; flex-direction: column; background: #000; }
        .top-bar {
            height: 48px; background: #000; border-bottom: 1px solid var(--border);
            padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-toggle {
            display: none; padding: 8px; margin-left: -8px; color: var(--text-secondary);
            cursor: pointer;
        }
        @media (max-width: 767px) {
            .sidebar-toggle { display: block; }
        }
        .iframe-container { flex: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: 0; }
        
        .modal { width: 100%; max-width: 440px; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .permission-grid {
            display: grid; grid-template-columns: 1fr; gap: 8px; max-height: 150px; overflow-y: auto;
            border: 1px solid var(--border); border-radius: 6px; padding: 8px; margin-top: 8px;
        }
        .permission-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 4px; }
        
        .context-menu {
            position: absolute; background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); padding: 4px; z-index: 10000;
            min-width: 160px; display: none;
        }
        .context-menu button {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px;
            background: transparent; border: none; color: var(--text-primary); font-size: 13px;
            cursor: pointer; border-radius: 4px; text-align: left;
        }
        .context-menu button:hover { background: rgba(255, 255, 255, 0.05); }
        .context-menu button.delete { color: var(--danger); }

        /* Custom Dropdown Overrides */
        .workspace-selector-container { padding: 0 8px 8px; position: relative; }
    </style>
</head>
<body>
    <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="toggleSidebar()"></div>
    <div class="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="brand"><h1>KS SSH</h1></div>
            </div>

            <div class="sidebar-scroll">
                <div class="section-label">General</div>
                <div class="nav-item active" id="nav-dashboard" onclick="navigateTo('dashboard')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5"/></svg>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" id="nav-account" onclick="navigateTo('account')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <span>Account Settings</span>
                </div>
                <div class="nav-item" id="nav-billing" onclick="navigateTo('billing')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                    <span>Billing & History</span>
                </div>
                <div class="nav-item" id="nav-earn" onclick="navigateTo('earn')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    <span>Earn Credits</span>
                </div>
                <div class="nav-item" id="nav-installation" onclick="navigateTo('installation')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    <span>Installation</span>
                </div>
                <div class="nav-item" id="nav-admin" onclick="navigateTo('admin')" style="display: none;">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span>Admin Panel</span>
                </div>

                <div class="section-label">Workspaces</div>
                <div class="workspace-selector-container">
                    <div class="custom-dropdown" id="ws-dropdown">
                        <div class="dropdown-toggle" onclick="toggleWorkspaceDropdown()">
                            <span id="selected-ws-name">All Workspaces</span>
                            <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                        <div class="dropdown-menu" id="ws-dropdown-menu">
                            <!-- Items populated by JS -->
                        </div>
                    </div>
                </div>

                <div class="section-label">Terminals</div>
                <div style="padding: 0 8px 12px;">
                    <input id="search-input" type="text" class="input" placeholder="Search..." style="margin-bottom: 8px; height: 36px; font-size: 13px;">
                    <button onclick="showAddModal()" class="btn btn-primary" style="width: 100%; height: 36px; font-size: 13px;">
                        <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        <span>Add Terminal</span>
                    </button>
                </div>

                <div id="terminals-list"></div>
            </div>

            <div style="padding: 16px; border-top: 1px solid var(--border);">
                <button onclick="handleLogout()" class="btn btn-secondary" style="width: 100%; font-size: 12px; color: var(--text-muted);">
                    Logout
                </button>
            </div>
        </aside>

        <main id="main-content">
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="sidebar-toggle" onclick="toggleSidebar()">
                        <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </div>
                    <h2 id="page-title" style="font-size: 16px; font-weight: 600;">Dashboard</h2>
                </div>
                <div id="credits-badge" class="badge badge-primary">0 CREDITS</div>
            </div>
            <div class="iframe-container">
                <iframe src="dashboard.html" id="main-iframe"></iframe>
            </div>
        </main>
    </div>

    <!-- MODALS -->
    <!-- Add Terminal -->
    <div id="add-modal" class="modal-overlay" onclick="if(event.target===this)closeModals()">
        <div class="modal-container">
            <div class="modal-header">
                <span class="modal-title">Add Terminal</span>
            </div>
            <div class="modal-content">
                <div style="margin-bottom: 16px;">
                    <label class="section-label" style="margin:0 0 8px;">Name</label>
                    <input id="modal-name" type="text" class="input" placeholder="Server name">
                </div>
                <div style="margin-bottom: 16px;">
                    <label class="section-label" style="margin:0 0 8px;">Token / URL</label>
                    <input id="modal-token" type="text" class="input" placeholder="token or https://...">
                </div>
                <div style="margin-bottom: 8px;">
                    <label class="section-label" style="margin:0 0 8px;">Workspace</label>
                    <select id="modal-workspace" class="input" style="background:#000;"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
                <button class="btn btn-primary" onclick="handleAddTerminal()">Add Terminal</button>
            </div>
        </div>
    </div>

    <!-- Workspace Settings -->
    <div id="ws-settings-modal" class="modal-overlay" onclick="if(event.target===this)closeModals()">
        <div class="modal-container" style="max-width: 500px;">
            <div class="modal-header">
                <span class="modal-title">Workspace Settings</span>
                <button class="btn btn-danger" style="padding: 4px 8px; font-size: 10px;" onclick="handleDeleteWorkspace()">Delete</button>
            </div>
            <div class="modal-content">
                <div style="margin-bottom: 20px;">
                    <label class="section-label" style="margin:0 0 8px;">Workspace Name</label>
                    <div style="display: flex; gap: 8px;">
                        <input id="ws-settings-name" type="text" class="input">
                        <button class="btn btn-primary" onclick="handleRenameWorkspace()">Rename</button>
                    </div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label class="section-label" style="margin:0 0 8px;">Add Member</label>
                    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                        <input id="new-member-username" type="text" class="input" placeholder="Username">
                        <select id="new-member-access" class="input" style="width: 120px; background:#000;" onchange="toggleMemberTermList('new')">
                            <option value="all">Full Access</option>
                            <option value="selected">Restricted</option>
                        </select>
                        <button class="btn btn-primary" onclick="handleAddMember()">Add</button>
                    </div>
                    <div id="new-member-term-list" class="permission-grid" style="display: none;"></div>
                </div>
                <div class="section-label">Members</div>
                <div id="ws-members-list" style="margin-top: 8px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeModals()">Done</button>
            </div>
        </div>
    </div>

    <!-- Create Workspace -->
    <div id="create-ws-modal" class="modal-overlay" onclick="if(event.target===this)closeModals()">
        <div class="modal-container">
            <div class="modal-header">
                <span class="modal-title">Create Workspace</span>
            </div>
            <div class="modal-content">
                <div style="margin-bottom: 8px;">
                    <label class="section-label" style="margin:0 0 8px;">Name</label>
                    <input id="new-ws-name" type="text" class="input" placeholder="e.g. Production">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
                <button class="btn btn-primary" onclick="confirmCreateWorkspace()">Create Workspace</button>
            </div>
        </div>
    </div>

    <div id="context-menu" class="context-menu">
        <button onclick="contextDelete()" class="delete">
            <svg style="width: 14px; height: 14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Delete Terminal
        </button>
    </div>

    <script>
        let terminals = [];
        let workspaces = [];
        let activeId = null;
        let currentUser = null;
        let currentWorkspaceId = 'all';
        let currentContextId = null;

        async function loadTerminals() {
            const res = await fetch(`/api/terminals${currentWorkspaceId !== 'all' ? '?workspaceId=' + currentWorkspaceId : ''}`);
            const data = await res.json();
            if (data.success) terminals = data.terminals;
            renderList();
        }

        async function loadWorkspaces() {
            const res = await fetch('/api/workspaces');
            const data = await res.json();
            if (data.success) {
                workspaces = data.workspaces;
                populateWorkspaceDropdown();
                populateModalWorkspaceSelect();
            }
        }

        function toggleWorkspaceDropdown() {
            document.getElementById('ws-dropdown-menu').classList.toggle('show');
            const handler = (e) => {
                if (!e.target.closest('#ws-dropdown')) {
                    document.getElementById('ws-dropdown-menu').classList.remove('show');
                    document.removeEventListener('click', handler);
                }
            };
            setTimeout(() => document.addEventListener('click', handler), 10);
        }

        function selectWorkspace(id, name) {
            currentWorkspaceId = id;
            document.getElementById('selected-ws-name').textContent = name;
            document.getElementById('ws-dropdown-menu').classList.remove('show');
            loadTerminals();
            populateWorkspaceDropdown();
        }

        function populateWorkspaceDropdown() {
            const menu = document.getElementById('ws-dropdown-menu');
            menu.innerHTML = '';

            const allItem = document.createElement('div');
            allItem.className = `dropdown-item ${currentWorkspaceId === 'all' ? 'active' : ''}`;
            allItem.textContent = 'All Workspaces';
            allItem.onclick = () => selectWorkspace('all', 'All Workspaces');
            menu.appendChild(allItem);

            workspaces.forEach(ws => {
                const div = document.createElement('div');
                div.className = `dropdown-item ${currentWorkspaceId === ws.id ? 'active' : ''}`;
                div.style.justifyContent = 'space-between';
                div.innerHTML = `<span>${ws.name}</span>`;

                if (ws.owner_id === currentUser?.id) {
                    const settingsBtn = document.createElement('button');
                    settingsBtn.className = 'btn btn-ghost';
                    settingsBtn.style.padding = '2px 6px';
                    settingsBtn.innerHTML = '<svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>';
                    settingsBtn.onclick = (e) => {
                        e.stopPropagation();
                        showWorkspaceSettings(ws.id);
                    };
                    div.appendChild(settingsBtn);
                }

                div.onclick = () => selectWorkspace(ws.id, ws.name);
                menu.appendChild(div);
            });

            const newItem = document.createElement('div');
            newItem.className = 'dropdown-item';
            newItem.style.borderTop = '1px solid var(--border)';
            newItem.style.color = 'var(--accent)';
            newItem.innerHTML = '<svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Create Workspace';
            newItem.onclick = () => showCreateWorkspaceModal();
            menu.appendChild(newItem);
        }

        function populateModalWorkspaceSelect() {
            const select = document.getElementById('modal-workspace');
            select.innerHTML = '';
            workspaces.forEach(ws => {
                if (ws.owner_id === currentUser?.id) {
                    const opt = document.createElement('option');
                    opt.value = ws.id;
                    opt.textContent = ws.name;
                    select.appendChild(opt);
                }
            });
        }

        function renderList() {
            const container = document.getElementById('terminals-list');
            container.innerHTML = '';
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            const filtered = terminals.filter(t => t.name.toLowerCase().includes(searchTerm) || t.token.toLowerCase().includes(searchTerm));

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--text-muted); font-size: 12px;">No terminals</div>';
                return;
            }

            filtered.forEach(term => {
                const div = document.createElement('div');
                div.className = `terminal-item ${term.id === activeId ? 'active' : ''}`;
                div.onclick = () => selectTerminal(term.id);
                div.oncontextmenu = (e) => { e.preventDefault(); showTerminalMenu(term.id, e); };
                div.innerHTML = `
                    <div class="terminal-info">
                        <div class="terminal-name">${term.name}</div>
                        <div class="terminal-token">${term.token}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function selectTerminal(id) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            activeId = id;
            const term = terminals.find(t => t.id === id);
            if (!term) return;
            document.getElementById('page-title').textContent = term.name;
            const targetUrl = term.token.startsWith('http') ? term.token : `https://${term.token}.trycloudflare.com`;
            document.getElementById('main-iframe').src = targetUrl;
            renderList();
            closeSidebarMobile();
        }

        // Modals
        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
        }
        function showAddModal() { document.getElementById('add-modal').classList.add('show'); }
        function showAccountModal() {
            document.getElementById('acc-username').value = currentUser.username;
            document.getElementById('acc-new-pw').value = '';
            document.getElementById('acc-curr-pw').value = '';
            document.getElementById('account-modal').classList.add('show');
        }
        function showCreateWorkspaceModal() { document.getElementById('create-ws-modal').classList.add('show'); }

        async function showWorkspaceSettings(id) {
            const ws = workspaces.find(w => w.id === id);
            currentWorkspaceId = id; // temporarily set for context
            document.getElementById('ws-settings-name').value = ws.name;
            document.getElementById('ws-settings-modal').classList.add('show');
            loadWorkspaceMembers(id);
            renderPermissionTerminals('new-member-term-list');
        }

        async function loadWorkspaceMembers(wsId) {
            const res = await fetch(`/api/workspaces/${wsId}/members`);
            const data = await res.json();
            const list = document.getElementById('ws-members-list');
            list.innerHTML = '';

            data.members.forEach(member => {
                if (member.id === currentUser.id) return;
                const div = document.createElement('div');
                div.className = 'nav-item';
                div.style.background = 'rgba(255,255,255,0.02)';
                div.style.marginBottom = '8px';
                div.style.flexDirection = 'column';
                div.style.alignItems = 'stretch';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span style="font-weight:600;">${member.username}</span>
                        <button class="btn btn-ghost" style="color:var(--danger); padding:2px 8px;" onclick="handleRemoveMember(${member.id})">Remove</button>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <select class="input" style="background:#000; font-size:12px;" onchange="updateMemberAccess(${member.id}, this.value)">
                            <option value="all" ${member.terminal_access_type === 'all' ? 'selected' : ''}>Full Access</option>
                            <option value="selected" ${member.terminal_access_type === 'selected' ? 'selected' : ''}>Restricted</option>
                        </select>
                    </div>
                    <div id="member-terms-${member.id}" class="permission-grid" style="display: ${member.terminal_access_type === 'selected' ? 'grid' : 'none'};">
                        ${renderPermissionTerminalsHTML(member.id, member.terminal_ids || [])}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function renderPermissionTerminalsHTML(memberId, selectedIds) {
            return terminals.map(t => `
                <label class="permission-item">
                    <input type="checkbox" value="${t.id}" ${selectedIds.includes(t.id) ? 'checked' : ''} onchange="updateMemberTerminalAccess(${memberId})">
                    ${t.name}
                </label>
            `).join('');
        }

        function renderPermissionTerminals(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = terminals.map(t => `
                <label class="permission-item">
                    <input type="checkbox" value="${t.id}">
                    ${t.name}
                </label>
            `).join('');
        }

        function toggleMemberTermList(type) {
            const val = document.getElementById(`${type}-member-access`).value;
            document.getElementById(`${type}-member-term-list`).style.display = val === 'selected' ? 'grid' : 'none';
        }

        // API Handlers
        async function handleAddTerminal() {
            const name = document.getElementById('modal-name').value;
            const token = document.getElementById('modal-token').value;
            const workspaceId = document.getElementById('modal-workspace').value;
            const res = await fetch('/api/terminals', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, token, workspaceId })
            });
            const data = await res.json();
            if (data.success) {
                closeModals();
                loadTerminals();
            } else ui.showToast(data.error, 'error');
        }

        async function confirmCreateWorkspace() {
            const name = document.getElementById('new-ws-name').value;
            const res = await fetch('/api/workspaces', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (data.success) {
                closeModals();
                loadWorkspaces();
            }
        }

        async function handleRenameWorkspace() {
            const oldName = workspaces.find(w => w.id === currentWorkspaceId)?.name;
            const newName = document.getElementById('ws-settings-name').value;

            // Optimistic update
            const ws = workspaces.find(w => w.id === currentWorkspaceId);
            if (ws) ws.name = newName;
            populateWorkspaceDropdown();
            if (currentWorkspaceId === currentWorkspaceId) { // if active
                document.getElementById('selected-ws-name').textContent = newName;
            }

            try {
                const res = await fetch(`/api/workspaces/${currentWorkspaceId}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: newName })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                loadWorkspaces(); // refresh to be sure
            } catch (err) {
                ui.showToast('Failed to rename: ' + err.message, 'error');
                if (ws) ws.name = oldName;
                populateWorkspaceDropdown();
                document.getElementById('selected-ws-name').textContent = oldName;
            }
        }

        async function handleDeleteWorkspace() {
            if (!await ui.confirm('Delete this workspace?')) return;
            const res = await fetch(`/api/workspaces/${currentWorkspaceId}`, { method: 'DELETE' });
            if ((await res.json()).success) {
                closeModals();
                selectWorkspace('all', 'All Workspaces');
                loadWorkspaces();
            }
        }

        async function handleAddMember() {
            const username = document.getElementById('new-member-username').value;
            const type = document.getElementById('new-member-access').value;
            const selected = Array.from(document.querySelectorAll('#new-member-term-list input:checked')).map(i => i.value);

            const res = await fetch(`/api/workspaces/${currentWorkspaceId}/members`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, terminal_access_type: type, terminal_ids: selected })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('new-member-username').value = '';
                loadWorkspaceMembers(currentWorkspaceId);
            } else ui.showToast(data.error, 'error');
        }

        async function updateMemberAccess(userId, type) {
            document.getElementById(`member-terms-${userId}`).style.display = type === 'selected' ? 'grid' : 'none';
            saveMemberPerms(userId);
        }

        async function updateMemberTerminalAccess(userId) {
            saveMemberPerms(userId);
        }

        async function saveMemberPerms(userId) {
            const type = document.querySelector(`#member-terms-${userId}`).previousElementSibling.querySelector('select').value;
            const selected = Array.from(document.querySelectorAll(`#member-terms-${userId} input:checked`)).map(i => i.value);
            await fetch(`/api/workspaces/${currentWorkspaceId}/members/${userId}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ terminal_access_type: type, terminal_ids: selected })
            });
        }

        async function handleRemoveMember(userId) {
            if (await ui.confirm('Remove member?')) {
                await fetch(`/api/workspaces/${currentWorkspaceId}/members/${userId}`, { method: 'DELETE' });
                loadWorkspaceMembers(currentWorkspaceId);
            }
        }

        function showTerminalMenu(id, e) {
            currentContextId = id;
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.top = e.clientY + 'px';
            menu.style.left = e.clientX + 'px';
            const h = () => { menu.style.display = 'none'; document.removeEventListener('click', h); };
            setTimeout(() => document.addEventListener('click', h), 10);
        }

        async function contextDelete() {
            if (!await ui.confirm('Delete terminal?')) return;

            const originalTerminals = [...terminals];
            terminals = terminals.filter(t => t.id !== currentContextId);
            renderList();

            try {
                const res = await fetch(`/api/terminals/${currentContextId}`, { method: 'DELETE' });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                ui.showToast('Terminal deleted');
            } catch (err) {
                ui.showToast('Failed to delete: ' + err.message, 'error');
                terminals = originalTerminals;
                renderList();
            }
        }

        function navigateTo(page) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.terminal-item').forEach(el => el.classList.remove('active'));

            if (page === 'dashboard') {
                document.getElementById('nav-dashboard').classList.add('active');
                document.getElementById('page-title').textContent = 'Dashboard';
                document.getElementById('main-iframe').src = 'dashboard.html';
            } else if (page === 'account') {
                document.getElementById('nav-account').classList.add('active');
                document.getElementById('page-title').textContent = 'Account Settings';
                document.getElementById('main-iframe').src = 'account.html';
            } else if (page === 'admin') {
                document.getElementById('nav-admin').classList.add('active');
                document.getElementById('page-title').textContent = 'Admin Panel';
                document.getElementById('main-iframe').src = 'admin.html';
            } else if (page === 'billing') {
                document.getElementById('nav-billing').classList.add('active');
                document.getElementById('page-title').textContent = 'Billing & History';
                document.getElementById('main-iframe').src = 'billing.html';
            } else if (page === 'earn') {
                document.getElementById('nav-earn').classList.add('active');
                document.getElementById('page-title').textContent = 'Earn Credits';
                document.getElementById('main-iframe').src = 'earn.html';
            } else if (page === 'installation') {
                document.getElementById('nav-installation').classList.add('active');
                document.getElementById('page-title').textContent = 'Installation Guide';
                document.getElementById('main-iframe').src = 'installation.html';
            }
            closeSidebarMobile();
        }

        function goHome() { navigateTo('dashboard'); }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            sidebar.classList.toggle('open');
            backdrop.classList.toggle('show');
        }

        function closeSidebarMobile() {
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebar-backdrop').classList.remove('show');
            }
        }
        async function handleLogout() {
            await fetch('/api/logout', { method: 'POST' });
            location.href = '/auth.html';
        }

        async function refreshUser() {
            const userRes = await fetch('/api/me');
            if (!userRes.ok) return;
            const userData = await userRes.json();
            currentUser = userData.user;
            document.getElementById('credits-badge').textContent = `${currentUser.credits} CREDITS`;
            document.getElementById('nav-admin').style.display = (currentUser.is_admin || currentUser.username === 'ksssh') ? 'flex' : 'none';
        }

        window.onload = async () => {
            const userRes = await fetch('/api/me');
            if (!userRes.ok) {
                location.href = '/auth.html';
                return;
            }
            const userData = await userRes.json();
            currentUser = userData.user;
            document.getElementById('credits-badge').textContent = `${currentUser.credits} CREDITS`;
            document.getElementById('nav-admin').style.display = (currentUser.is_admin || currentUser.username === 'ksssh') ? 'flex' : 'none';

            await loadWorkspaces();
            await loadTerminals();
            document.getElementById('search-input').oninput = renderList;
        };
    </script>
</body>
</html>
