<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <style>
        body { padding: 16px; background: #000; color: #fff; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }

        .welcome-hero {
            padding: 24px; background: linear-gradient(135deg, #0a0a0a 0%, #111 100%);
            border: 1px solid #1e293b; border-radius: 4px; margin-bottom: 20px;
            position: relative; overflow: hidden;
        }
        .welcome-hero::after {
            content: ''; position: absolute; top: -50%; right: -20%; width: 60%; height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            transform: rotate(-15deg); pointer-events: none;
        }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .stat-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card-modern {
            background: #0a0a0a; border: 1px solid #1e293b; padding: 16px; border-radius: 4px;
            transition: all 0.3s ease;
        }
        .stat-card-modern:hover { border-color: var(--accent); transform: translateY(-2px); }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-family: var(--font-mono); }
        .stat-value { font-size: 24px; font-weight: 700; color: #fff; font-family: var(--font-mono); }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }

        .terminal-card-modern {
            background: #0a0a0a; border: 1px solid #1e293b; padding: 14px; border-radius: 4px;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
            transition: all 0.2s ease;
        }
        .terminal-card-modern:hover { background: #0f0f0f; border-color: var(--accent); }

        .quick-action-card {
            background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.1);
            padding: 14px; border-radius: 4px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: all 0.2s; margin-bottom: 8px;
        }
        .quick-action-card:hover { background: rgba(59, 130, 246, 0.1); border-color: var(--accent); }
        .action-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 2px; display: flex; align-items: center; justify-content: center; color: white; }

        .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .activity-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="dashboard-container animate-slide-up">
        <div class="welcome-hero">
            <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 4px;">Welcome back, <span id="user-name">User</span>!</h1>
            <p style="color: var(--text-muted); font-size: 14px; font-family: var(--font-mono);">SYSTEM_STATUS: ONLINE</p>
        </div>

        <div class="dashboard-grid">
            <div class="main-col">
                <div class="stat-group">
                <div class="stat-card-modern" id="stat-terminals-card">
                        <div class="stat-label">Total Terminals</div>
                        <div id="stat-terminals" class="stat-value">0</div>
                    </div>
                <div class="stat-card-modern" id="stat-workspaces-card">
                        <div class="stat-label">Workspaces</div>
                        <div id="stat-workspaces" class="stat-value">0</div>
                    </div>
                <div class="stat-card-modern" id="stat-earnings-card">
                        <div class="stat-label">Total Earnings</div>
                        <div id="stat-total-earned" class="stat-value">0</div>
                    </div>
                </div>

                <div class="section-header">
                    <h2 class="section-title">Favorite Terminals</h2>
                </div>
                <div id="favorites-list" style="margin-bottom: 32px;">
                    <div class="terminal-card-modern skeleton" style="height: 66px; margin-bottom: 8px;"></div>
                </div>

                <div class="section-header">
                    <h2 class="section-title">Recent Terminals</h2>
                </div>
                <div id="recent-list">
                    <div class="terminal-card-modern skeleton" style="height: 66px; margin-bottom: 8px;"></div>
                </div>
            </div>

            <div class="side-col">
                <div class="section-header">
                    <h2 class="section-title">Quick Actions</h2>
                </div>
                <div class="quick-action-card" onclick="window.parent.navigateTo('billing')">
                    <div class="action-icon" style="background: #10b981;">
                        <svg style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <div>
                        <div style="font-weight: 600; font-size: 14px;">Billing History</div>
                        <div style="font-size: 12px; color: var(--text-muted);">View transactions</div>
                    </div>
                </div>

                <div class="section-header" style="margin-top: 32px;">
                    <h2 class="section-title">Recent Activity</h2>
                </div>
                <div class="card" id="activity-list" style="padding: 0 20px;">
                <!-- Skeleton Loading -->
                <div class="activity-item skeleton" style="height: 50px; margin: 12px 0;"></div>
                <div class="activity-item skeleton" style="height: 50px; margin: 12px 0;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            // Apply skeletons to stat cards initially
            ['stat-terminals-card', 'stat-workspaces-card', 'stat-earnings-card'].forEach(id => {
                document.getElementById(id).classList.add('skeleton');
            });

            // Parallelize API calls
            const [userRes, wsRes, termRes, billRes] = await Promise.all([
                fetch('/api/me').then(r => r.json()),
                fetch('/api/workspaces').then(r => r.json()),
                fetch('/api/terminals').then(r => r.json()),
                fetch('/api/billing/history').then(r => r.json())
            ]);

            if (userRes.success) {
                document.getElementById('user-name').textContent = userRes.user.username;
            }

            if (wsRes.success) {
                document.getElementById('stat-workspaces-card').classList.remove('skeleton');
                document.getElementById('stat-workspaces').textContent = wsRes.workspaces.length;
            }

            if (termRes.success) {
                document.getElementById('stat-terminals-card').classList.remove('skeleton');
                document.getElementById('stat-terminals').textContent = termRes.terminals.length;

                // Fetch favorites and recent
                const [favRes, recRes] = await Promise.all([
                    fetch('/api/terminals?favorites=true').then(r => r.json()),
                    fetch('/api/terminals/recent').then(r => r.json())
                ]);

                if (favRes.success) renderTerminals(favRes.terminals, 'favorites-list');
                if (recRes.success) renderTerminals(recRes.terminals, 'recent-list');
            }

            if (billRes.success) {
                document.getElementById('stat-earnings-card').classList.remove('skeleton');
                const total = billRes.history.reduce((sum, item) => sum + item.amount, 0);
                document.getElementById('stat-total-earned').textContent = total;
                renderActivity(billRes.history.slice(0, 5));
            }
        }

        function renderTerminals(terms, containerId) {
            const container = document.getElementById(containerId);
            if (terms.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; border: 1px dashed #1e293b; border-radius: 4px;">No terminals</div>';
                return;
            }

            container.innerHTML = terms.map(t => `
                <div class="terminal-card-modern">
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <div id="status-${containerId}-${t.id}" style="width: 8px; height: 8px; border-radius: 50%; background: #4b5563;"></div>
                        <div>
                            <div style="font-weight: 600; font-size: 15px;">${t.name}</div>
                            <div style="font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);">${t.token}</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-ghost" style="padding: 6px;" onclick="toggleFavorite('${t.id}')">
                            <svg style="width:16px;height:16px; color: ${t.is_favorite ? 'var(--warning)' : 'var(--text-muted)'};" fill="${t.is_favorite ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
                        </button>
                        <button class="btn btn-primary" style="height: 36px; padding: 0 16px; font-size: 13px;" onclick="window.parent.selectTerminal('${t.id}')">Connect</button>
                    </div>
                </div>
            `).join('');

            // Trigger status check
            terms.forEach(t => refreshTerminalStatus(t.id, containerId));
        }

        async function toggleFavorite(id) {
            const res = await fetch(`/api/terminals/${id}/favorite`, { method: 'POST' });
            if ((await res.json()).success) loadDashboard();
        }

        async function refreshTerminalStatus(id, containerId) {
            const dot = document.getElementById(`status-${containerId}-${id}`);
            if (!dot) return;

            try {
                const res = await fetch(`/api/terminals/${id}/status`);
                const data = await res.json();
                if (data.success && data.online) {
                    dot.style.background = '#10b981';
                    dot.style.boxShadow = '0 0 8px #10b981';
                } else {
                    dot.style.background = '#ef4444';
                    dot.style.boxShadow = 'none';
                }
            } catch (e) {
                dot.style.background = '#ef4444';
            }
        }


        function renderActivity(history) {
            const container = document.getElementById('activity-list');
            container.innerHTML = history.map(h => {
                const isPositive = h.amount > 0;
                const color = isPositive ? '#10b981' : '#ef4444';
                const sign = isPositive ? '+' : '';
                return `
                    <div class="activity-item">
                        <div style="font-size: 13px;">
                            <span style="color: ${color}; font-weight: 600;">${sign}${h.amount}</span>
                            <span style="color: var(--text-secondary);">${h.type}</span>
                            <div style="font-size: 11px; color: var(--text-muted); margin-top: 2px;">${new Date(h.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                `;
            }).join('') || '<div style="padding: 20px; font-size: 13px; color: var(--text-muted);">No recent activity</div>';
        }

        window.onload = loadDashboard;

        let searchTimeout;
        document.getElementById('terminal-search').oninput = () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetch('/api/terminals').then(r => r.json()).then(d => renderTerminals(d.terminals));
            }, 300);
        };
    </script>
</body>
</html>
