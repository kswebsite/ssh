<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <script src="ui.js"></script>
    <style>
        body { padding: 16px; background: #000; color: #fff; }
        .admin-container { max-width: 1200px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }

        .admin-tabs { display: flex; gap: 16px; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .admin-tab { padding: 8px 4px; font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; position: relative; font-family: var(--font-mono); text-transform: uppercase; }
        .admin-tab.active { color: var(--accent); }
        .admin-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 1rem; }
        .user-table { width: 100%; min-width: 600px; border-collapse: separate; border-spacing: 0 4px; }
        .user-table th { text-align: left; padding: 8px 12px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-mono); }
        .user-row { background: #0a0a0a; border: 1px solid #1e293b; transition: all 0.1s; }
        .user-row td { padding: 10px 12px; font-size: 13px; border-top: 1px solid #1e293b; border-bottom: 1px solid #1e293b; }
        .user-row td:first-child { border-left: 1px solid #1e293b; border-radius: 2px 0 0 2px; }
        .user-row td:last-child { border-right: 1px solid #1e293b; border-radius: 0 2px 2px 0; }

        .config-form { max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
        .config-group { display: flex; flex-direction: column; gap: 8px; }
        .config-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="admin-container animate-slide-up">
        <h1 style="font-size: 20px; font-weight: 800; margin-bottom: 24px; letter-spacing: 0.05em; font-family: var(--font-mono);">SYSTEM_ADMIN</h1>

        <div class="admin-tabs">
            <div class="admin-tab active" onclick="switchTab('users', event)">Users</div>
            <div class="admin-tab" onclick="switchTab('coupons', event)">Coupons</div>
            <div class="admin-tab" onclick="switchTab('settings', event)">Settings</div>
        </div>

        <div id="tab-users" class="tab-content active">
            <div id="stat-users-container" class="stats-grid">
                <div class="card"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Total Users</div><div id="stat-users" style="font-size:24px;font-weight:700;">0</div></div>
                <div class="card"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Global Credits</div><div id="stat-credits" style="font-size:24px;font-weight:700;color:var(--accent);">0</div></div>
            </div>

            <div style="margin-bottom: 20px; display: flex; gap: 12px;">
                <input type="text" id="user-search" class="input" placeholder="Search users by name or email..." oninput="renderUserList()">
            </div>

            <div class="table-responsive">
                <table class="user-table"><thead><tr><th>User</th><th>Credits</th><th>Joined</th><th>Actions</th></tr></thead><tbody id="user-list"></tbody></table>
            </div>
        </div>

        <div id="tab-coupons" class="tab-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:12px;"><h2>Coupons</h2><button class="btn btn-primary" onclick="showCreateCoupon()">+ New Coupon</button></div>
            <div class="table-responsive">
                <table class="user-table"><thead><tr><th>Code</th><th>Reward</th><th>Usage</th><th>Actions</th></tr></thead><tbody id="coupon-list"></tbody></table>
            </div>
        </div>


        <div id="tab-settings" class="tab-content">
            <h2>System Config</h2>
            <div class="card config-form" id="settings-form">
                <p style="color: var(--text-muted); font-size: 13px;">No global settings available at this time.</p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab, e) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            if(tab === 'users') loadUsers();
            if(tab === 'coupons') loadCoupons();
            if(tab === 'settings') loadSettings();
        }

        let allUsers = [];
        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const data = await res.json();
            if (data.success) {
                allUsers = data.users;
                const totalCredits = allUsers.reduce((sum, u) => sum + u.credits, 0);
                document.getElementById('stat-users').textContent = allUsers.length;
                document.getElementById('stat-credits').textContent = totalCredits.toLocaleString();
                renderUserList();
            }
        }

        function renderUserList() {
            const query = document.getElementById('user-search').value.toLowerCase();
            const filtered = allUsers.filter(u => u.username.toLowerCase().includes(query) || u.email.toLowerCase().includes(query));

            document.getElementById('user-list').innerHTML = filtered.map(u => `
                <tr class="user-row" style="${u.is_banned ? 'opacity: 0.5;' : ''}">
                    <td>
                        <b>${u.username}</b> ${u.is_admin ? '<span class="badge badge-primary" style="font-size:8px; padding:1px 4px;">ADMIN</span>' : ''}
                        <br><small>${u.email}</small>
                    </td>
                    <td>${u.credits}</td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                        <div style="display:flex; gap:4px;">
                            <button class="btn btn-ghost" style="padding:4px 8px;" onclick="adjustCredits(${u.id}, ${u.credits})">Credits</button>
                            <button class="btn btn-ghost" style="padding:4px 8px; color:${u.is_banned ? 'var(--success)' : 'var(--danger)'};" onclick="toggleBan(${u.id}, ${u.is_banned})">
                                ${u.is_banned ? 'Unban' : 'Ban'}
                            </button>
                            ${!u.is_admin ? `<button class="btn btn-ghost" style="padding:4px 8px; color:var(--accent);" onclick="promoteAdmin(${u.id})">Promote</button>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function toggleBan(id, current) {
            if (!await ui.confirm(`${current ? 'Unban' : 'Ban'} this user?`)) return;

            const originalUsers = allUsers.map(u => ({...u}));
            const index = allUsers.findIndex(u => u.id === id);
            if (index !== -1) allUsers[index].is_banned = !current;
            renderUserList();

            try {
                const res = await fetch(`/api/admin/users/${id}/ban`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ banned: !current })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                ui.showToast(current ? 'User unbanned' : 'User banned', 'success');
            } catch (err) {
                ui.showToast(err.message || 'Action failed', 'error');
                allUsers = originalUsers;
                renderUserList();
            }
        }

        async function promoteAdmin(id) {
            if (!await ui.confirm('Promote this user to Admin?')) return;

            const originalUsers = allUsers.map(u => ({...u}));
            const index = allUsers.findIndex(u => u.id === id);
            if (index !== -1) allUsers[index].is_admin = 1;
            renderUserList();

            try {
                const res = await fetch(`/api/admin/users/${id}/promote`, { method: 'POST' });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                ui.showToast('User promoted to Admin', 'success');
            } catch (err) {
                ui.showToast(err.message || 'Action failed', 'error');
                allUsers = originalUsers;
                renderUserList();
            }
        }


        let allCoupons = [];
        async function loadCoupons() {
            const res = await fetch('/api/admin/coupons');
            const data = await res.json();
            if (data.success) {
                allCoupons = data.coupons;
                renderCouponList();
            }
        }

        function renderCouponList() {
            document.getElementById('coupon-list').innerHTML = allCoupons.map(c => `
                <tr class="user-row">
                    <td><code>${c.code}</code></td>
                    <td>${c.reward}</td>
                    <td>${c.current_uses}/${c.max_uses}</td>
                    <td><button class="btn btn-ghost" style="color:var(--danger);" onclick="deleteCoupon('${c.id}')">Delete</button></td>
                </tr>
            `).join('');
        }

        async function showCreateCoupon() {
            const res = await ui.prompt([
                { name: 'code', label: 'Coupon Code', placeholder: 'SUMMER2024' },
                { name: 'reward', label: 'Reward amount', type: 'number', value: '50' },
                { name: 'max', label: 'Max Uses', type: 'number', value: '100' }
            ], 'Create Coupon');

            if(!res || !res.code || !res.reward) return;

            const tempId = 'temp-' + Date.now();
            const originalCoupons = [...allCoupons];
            const newCoupon = { id: tempId, code: res.code.toUpperCase(), reward: parseInt(res.reward), current_uses: 0, max_uses: parseInt(res.max) };

            allCoupons.unshift(newCoupon);
            renderCouponList();
            ui.showToast('Creating coupon...', 'info');

            try {
                const apiRes = await fetch('/api/admin/coupons', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        code: res.code,
                        reward: parseInt(res.reward),
                        max_uses: parseInt(res.max)
                    })
                });
                const data = await apiRes.json();
                if (data.success) {
                    ui.showToast('Coupon created', 'success');
                    loadCoupons(); // get real IDs
                } else throw new Error(data.error);
            } catch (err) {
                ui.showToast(err.message || 'Action failed', 'error');
                allCoupons = originalCoupons;
                renderCouponList();
            }
        }

        async function deleteCoupon(id) {
            if(!await ui.confirm('Delete this coupon?')) return;

            const originalCoupons = [...allCoupons];
            allCoupons = allCoupons.filter(c => c.id !== id);
            renderCouponList();

            try {
                const res = await fetch(`/api/admin/coupons/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                ui.showToast('Coupon deleted', 'success');
            } catch (err) {
                ui.showToast(err.message || 'Action failed', 'error');
                allCoupons = originalCoupons;
                renderCouponList();
            }
        }

        async function loadSettings() {
            const res = await fetch('/api/admin/settings');
            const data = await res.json();
            Object.entries(data.settings).forEach(([k, v]) => {
                const el = document.getElementById(`cfg-${k}`);
                if(el) el.value = v;
            });
        }

        async function saveSettings() {
            ui.showToast('No settings to save');
        }

        async function adjustCredits(id, curr) {
            const res = await ui.prompt([
                { name: 'credits', label: 'New Balance', type: 'number', value: curr }
            ], 'Adjust User Credits');

            if(!res || res.credits === null) return;

            const originalUsers = allUsers.map(u => ({...u}));
            const newCredits = parseInt(res.credits);
            const index = allUsers.findIndex(u => u.id === id);
            if (index !== -1) allUsers[index].credits = newCredits;
            renderUserList();

            try {
                const res = await fetch(`/api/admin/users/${id}/credits`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ credits: newCredits })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                ui.showToast('Credits updated', 'success');
            } catch (err) {
                ui.showToast(err.message || 'Action failed', 'error');
                allUsers = originalUsers;
                renderUserList();
            }
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
