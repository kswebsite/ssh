<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS SSH</title>

<style>
:root {
    --blue: #3b82f6;
    --dark: #020617;
    --card: #0f172a;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: white;
}

/* CENTER */
.container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    text-align: center;
}

/* LOGO */
.logo {
    width: 70px;
    border-radius: 20px;
    margin-bottom: 10px;
    box-shadow: 0 0 25px var(--blue);
}

.title {
    font-size: 42px;
    font-weight: bold;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 30px;
}

/* CARD */
.card {
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid rgba(59,130,246,0.2);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
}

/* INPUT */
.input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(59,130,246,0.3);
    background: #020617;
    color: white;
    margin-bottom: 15px;
    font-size: 15px;
}

.input:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 10px rgba(59,130,246,0.4);
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    background: var(--blue);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: #2563eb;
    transform: scale(1.03);
}

/* FEATURES */
.features {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 15px;
    width: 100%;
    max-width: 600px;
}

.feature {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(59,130,246,0.2);
    transition: 0.2s;
}

.feature:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(59,130,246,0.2);
}

.feature h4 {
    margin-bottom: 5px;
    color: var(--blue);
}

.feature p {
    font-size: 13px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

    <img src="/image/logo.png" class="logo">
    <div class="title">KS SSH</div>
    <div class="subtitle">Web Terminal • Ports • File Manager</div>

    <!-- CONNECT -->
    <div class="card">
        <input id="token" class="input" placeholder="Enter your token...">
        <button class="btn" onclick="connect()">Connect</button>
    </div>

    <!-- FEATURES -->
    <div class="features">
        <div class="feature">
            <h4>💻 Terminal</h4>
            <p>Multi terminal, resize, themes</p>
        </div>

        <div class="feature">
            <h4>🔌 Ports</h4>
            <p>Monitor & preview ports</p>
        </div>

        <div class="feature">
            <h4>📁 Files</h4>
            <p>Full file manager support</p>
        </div>

        <div class="feature">
            <h4>⚡ Fast</h4>
            <p>Lightweight & smooth</p>
        </div>
    </div>

</div>

<script>
function connect() {
    const token = document.getElementById("token").value.trim();

    if (!token) {
        alert("Enter token");
        return;
    }

    let terminals = JSON.parse(localStorage.getItem('ks_ssh_terminals') || '[]');

    const exists = terminals.find(t => t.token === token);
    if (exists) {
        localStorage.setItem('lastActiveId', exists.id);
        window.location.href = 'dashboard.html';
        return;
    }

    const newTerm = {
        id: Date.now().toString(),
        name: `Terminal ${terminals.length + 1}`,
        token,
        added: Date.now()
    };

    terminals.unshift(newTerm);
    localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
    localStorage.setItem('lastActiveId', newTerm.id);

    window.location.href = 'dashboard.html';
}
</script>

</body>
</html>
