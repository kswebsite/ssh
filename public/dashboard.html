<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS SSH — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --sidebar-width: 225px;
            --primary-blue: #3b82f6;
            --electric-blue: #60a5fa;
            --deep-blue: #1e3a8a;
            --navy: #0f172a;
            --black: #020617;
        }
        
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: var(--black);
            font-family: 'Inter', sans-serif;
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgb(59 130 246 / 0.1), 0 8px 10px -6px rgb(59 130 246 / 0.1);
        }
        
        .token-blur {
            filter: blur(6px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
        }
        
        .token-revealed {
            filter: blur(0);
        }
        
        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        
        .btn-primary {
            background: #3b82f6;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background: #2563eb;
            transform: scale(1.03);
        }
        
        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .status-dot {
            animation: pulse 2s ease-in-out infinite;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.4);
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-black text-white antialiased">
    <div class="flex flex-col h-screen w-full">
        
        <!-- DASHBOARD HEADER -->
        <div class="h-14 md:h-16 bg-slate-950 border-b border-blue-900/30 px-6 flex items-center justify-between flex-shrink-0">
            <!-- Left: Title -->
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center w-8 h-8 bg-blue-600 rounded-xl shadow-lg shadow-blue-600/30">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tighter text-white">KS SSH</h1>
                <div class="px-3 py-1 bg-blue-500/10 border border-blue-500/30 rounded-2xl flex items-center gap-1.5 text-xs font-semibold text-blue-400">
                    <div class="w-2 h-2 bg-blue-400 rounded-full status-dot"></div>
                    LIVE
                </div>
            </div>

            <!-- Right: Add Button -->
            <button onclick="showAddModal()" 
                    class="flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/10 hover:border-blue-400 text-white px-6 py-2.5 rounded-2xl font-medium text-sm transition-all active:scale-95">
                <span class="text-xl leading-none mt-px">+</span>
                <span class="hidden sm:inline">New Terminal</span>
                <span class="sm:hidden">New</span>
            </button>
        </div>

        <!-- MAIN DASHBOARD CONTENT -->
        <div class="flex-1 p-6 md:p-8 overflow-y-auto bg-gradient-to-b from-black to-slate-950">
            
            <div class="max-w-screen-2xl mx-auto">
                <!-- Title + Stats -->
                <div class="flex items-end justify-between mb-8">
                    <div>
                        <h2 class="text-3xl font-semibold tracking-tight">Your Terminals</h2>
                        <p id="terminal-count" class="text-blue-400 text-sm mt-1">0 active connections • Secure • Encrypted</p>
                    </div>
                    
                    <div onclick="refreshDashboard()" class="flex items-center gap-2 text-xs font-medium text-emerald-400 hover:text-emerald-300 cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.058 11H1M12 3v2m0 16v2m9-9H15" />
                        </svg>
                        <span>REFRESH</span>
                    </div>
                </div>

                <!-- TERMINALS GRID -->
                <div id="terminals-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Populated by JavaScript -->
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center">
                    <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-blue-500/10 flex items-center justify-center">
                        <svg class="w-12 h-12 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2"/>
                        </svg>
                    </div>
                    <h3 class="text-xl font-semibold mb-2">No terminals yet</h3>
                    <p class="text-slate-400 max-w-xs">Add your first KS SSH terminal using the button above and start connecting instantly.</p>
                    <button onclick="showAddModal()" 
                            class="mt-8 btn-primary px-8 py-3.5 text-white flex items-center gap-3">
                        <span class="text-2xl leading-none">+</span>
                        <span class="font-medium">Add Your First Terminal</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD TERMINAL MODAL (same beautiful modal as parent) -->
    <div onclick="if(event.target.id === 'add-modal-dashboard') hideAddModal()" 
         id="add-modal-dashboard"
         class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[9999] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal glass-panel w-full max-w-md rounded-3xl p-8 shadow-2xl">
            
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-white">Add New Terminal</h2>
                <button onclick="hideAddModal()" class="text-slate-400 hover:text-white text-3xl leading-none">×</button>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-xs uppercase tracking-[1px] text-blue-400 font-semibold mb-2 block">Display Name</label>
                    <input id="dashboard-modal-name" 
                           type="text" 
                           placeholder="My Production Server"
                           class="input-field w-full px-5 py-4 text-lg placeholder-slate-400">
                </div>

                <div>
                    <label class="text-xs uppercase tracking-[1px] text-blue-400 font-semibold mb-2 block">Token</label>
                    <input id="dashboard-modal-token" 
                           type="text" 
                           placeholder="abc123-def456-ghij789"
                           class="input-field w-full px-5 py-4 text-lg font-mono placeholder-slate-500 text-blue-300">
                    <p class="text-[10px] text-slate-400 mt-3 flex items-center gap-2">
                        <span class="inline-block w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                        Paste the token from your KS Panel
                    </p>
                </div>
            </div>

            <div class="flex gap-3 mt-10">
                <button onclick="hideAddModal()" 
                        class="flex-1 py-4 text-slate-300 hover:bg-slate-800 rounded-2xl border border-slate-700 font-medium">
                    CANCEL
                </button>
                <button onclick="handleAddTerminal()" 
                        class="flex-1 py-4 btn-primary text-white font-semibold flex items-center justify-center gap-2">
                    <span>ADD TERMINAL</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============== GLOBAL STATE ==============
        let terminals = [];

        // ============== LOCALSTORAGE (shared with parent page) ==============
        function loadTerminals() {
            const saved = localStorage.getItem('ks_ssh_terminals');
            if (saved) {
                terminals = JSON.parse(saved);
            } else {
                terminals = [];
            }
        }

        function saveTerminals() {
            localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
            
            // Sync with parent sidebar if it exists
            if (window.parent && typeof window.parent.renderList === 'function') {
                window.parent.renderList();
            }
        }

        // ============== RENDER CARDS ==============
        function renderCards() {
            const grid = document.getElementById('terminals-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '';

            if (terminals.length === 0) {
                empty.classList.remove('hidden');
                document.getElementById('terminal-count').textContent = '0 terminals';
                return;
            }

            empty.classList.add('hidden');
            document.getElementById('terminal-count').innerHTML = `
                ${terminals.length} terminal${terminals.length > 1 ? 's' : ''} 
                <span class="text-emerald-400">• Ready to connect</span>
            `;

            terminals.forEach(term => {
                const cardHTML = `
                <div class="card glass-panel rounded-3xl p-6 flex flex-col h-full group">
                    <!-- Card Header -->
                    <div class="flex items-start justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-gradient-to-br from-blue-400 to-cyan-400 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <div>
                                <div class="font-semibold text-xl text-white tracking-tight">${term.name}</div>
                                <div class="text-[10px] font-mono text-emerald-400/70">Added ${new Date(term.added).toLocaleDateString('en-US', {month:'short', day:'numeric'})}</div>
                            </div>
                        </div>
                        
                        <!-- Status indicator -->
                        <div class="flex items-center gap-1 bg-emerald-400/10 text-emerald-400 text-[10px] font-bold px-3 py-1 rounded-3xl">
                            <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                            ONLINE
                        </div>
                    </div>

                    <!-- Token Section -->
                    <div class="mt-auto pt-8">
                        <div class="text-xs font-semibold uppercase tracking-widest text-blue-400 mb-2 flex items-center justify-between">
                            ACCESS TOKEN
                            <span onclick="copyToken('${term.id}', '${term.token}');" 
                                  class="cursor-pointer text-[10px] bg-blue-500/10 hover:bg-blue-500/20 px-2 py-px rounded-md transition-colors flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M8 16v-4m4 4v4m-8-8h8a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v4a2 2 0 002 2z"/>
                                </svg>
                                COPY
                            </span>
                        </div>
                        
                        <div onclick="copyToken('${term.id}', '${term.token}');" 
                             class="group/token bg-slate-900/80 hover:bg-slate-900 border border-blue-900/30 rounded-2xl p-4 font-mono text-blue-300 text-sm flex items-center cursor-pointer">
                            <span id="token-display-${term.id}" 
                                  class="token-blur flex-1 break-all pr-3 transition-all"
                                  data-token="${term.token}">
                                ${term.token}
                            </span>
                            
                            <!-- Copy icon inside the token area -->
                            <div class="opacity-40 group-hover/token:opacity-100 transition-opacity">
                                📋
                            </div>
                        </div>
                        
                        <p class="text-[10px] text-slate-500 mt-2 text-center">Click token area to reveal + copy</p>
                    </div>

                    <!-- Connect Button -->
                    <button onclick="connectTerminal('${term.id}'); event.stopImmediatePropagation();" 
                            class="mt-6 w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-[0.97]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                        </svg>
                        CONNECT NOW
                    </button>
                </div>`;
                
                grid.innerHTML += cardHTML;
            });
        }

        // ============== COPY TOKEN WITH REVEAL ==============
        window.copyToken = function(id, token) {
            navigator.clipboard.writeText(token).then(() => {
                const displayEl = document.getElementById(`token-display-${id}`);
                if (displayEl) {
                    // Reveal the token permanently for this session
                    displayEl.classList.remove('token-blur');
                    displayEl.classList.add('token-revealed');
                    
                    // Brief success flash
                    displayEl.style.transitionDuration = '150ms';
                    displayEl.style.color = '#10b981';
                    setTimeout(() => {
                        displayEl.style.color = '';
                        displayEl.style.transitionDuration = '';
                    }, 800);
                }
                
                // Toast
                showToast('✅ Token copied to clipboard');
            }).catch(() => {
                showToast('❌ Failed to copy');
            });
        };

        // ============== CONNECT TO TERMINAL (calls parent) ==============
        window.connectTerminal = function(id) {
            if (window.parent && typeof window.parent.selectTerminal === 'function') {
                // Close any modal if open
                hideAddModal();
                // Tell parent to open the terminal
                window.parent.selectTerminal(id);
            } else {
                // Fallback for standalone testing
                alert('Terminal opened in main window (parent frame)');
            }
        };

        // ============== ADD MODAL ==============
        window.showAddModal = function() {
            const modal = document.getElementById('add-modal-dashboard');
            document.getElementById('dashboard-modal-name').value = '';
            document.getElementById('dashboard-modal-token').value = '';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                document.getElementById('dashboard-modal-name').focus();
            }, 100);
        };

        window.hideAddModal = function() {
            const modal = document.getElementById('add-modal-dashboard');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        window.handleAddTerminal = function() {
            const name = document.getElementById('dashboard-modal-name').value.trim();
            const token = document.getElementById('dashboard-modal-token').value.trim();

            if (!token) {
                alert('Token is required');
                return;
            }

            // Prevent duplicates
            if (terminals.some(t => t.token === token)) {
                alert('This token is already added!');
                return;
            }

            const newTerm = {
                id: Date.now().toString(),
                name: name || `Terminal ${terminals.length + 1}`,
                token: token,
                added: Date.now()
            };

            terminals.unshift(newTerm);
            saveTerminals();
            hideAddModal();
            renderCards();
            
            // Auto-connect after adding (optional nice UX)
            setTimeout(() => {
                if (window.parent && typeof window.parent.selectTerminal === 'function') {
                    window.parent.selectTerminal(newTerm.id);
                }
            }, 600);
        };

        // ============== REFRESH ==============
        window.refreshDashboard = function() {
            loadTerminals();
            renderCards();
            
            const btns = document.querySelectorAll('.status-dot');
            if (btns.length) {
                btns.forEach(dot => {
                    dot.style.animation = 'none';
                    void dot.offsetWidth;
                    dot.style.animation = 'pulse 2s ease-in-out infinite';
                });
            }
            
            showToast('Dashboard refreshed');
        };

        // ============== SIMPLE TOAST ==============
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
                background: #0f172a; color: white; padding: 14px 24px; border-radius: 9999px;
                border: 1px solid #3b82f6; box-shadow: 0 10px 15px -3px rgb(59 130 246);
                font-size: 14px; z-index: 99999; display: flex; align-items: center; gap: 8px;
                animation: toastPop 0.3s ease forwards;
            `;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transition = 'all 0.3s ease';
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 2800);
        }

        // ============== INIT ==============
        function initDashboard() {
            loadTerminals();
            renderCards();
            
            // Tailwind script already loaded
            console.log('%c✅ KS SSH Dashboard ready', 'color:#3b82f6; font-family:monospace; font-size:10px');
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
