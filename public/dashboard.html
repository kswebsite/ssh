<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --primary-blue: #3b82f6;
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.95);
            --border-blue: rgba(59, 130, 246, 0.2);
            --slate-900: #0f172a;
            --slate-700: #334155;
            --emerald-400: #34d399;
            --blue-600: #2563eb;
        }

        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* Top Bar - exactly like main app, perfectly balanced for mobile & desktop */
        .top-bar {
            height: 56px;
            background: #0f172a;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 1px 0 rgba(59, 130, 246, 0.1);
        }

        @media (min-width: 768px) {
            .top-bar {
                padding: 0 24px;
                height: 64px;
            }
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* Workspaces section - clean, same line, responsive */
        .workspaces-section {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 420px;
        }

        .form-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            padding: 9px 12px;
            color: white;
            font-size: 13px;
            outline: none;
            flex: 1;
            min-width: 0;
        }

        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .action-btn-small {
            padding: 9px 14px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 6px;
            color: #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            min-width: 42px;
            flex-shrink: 0;
        }

        .action-btn-small:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        /* Credits badge - same as sidebar header */
        .credits-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 4px;
            font-size: 13px;
            color: #60a5fa;
            font-weight: 600;
            white-space: nowrap;
        }

        .credits-badge .dot {
            width: 6px;
            height: 6px;
            background: #60a5fa;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Add button - same style as sidebar */
        .btn-primary {
            background: #3b82f6;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        /* Tabs - below top bar, clean and stylish */
        .tabs {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #020617;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            padding: 8px 20px;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        @media (min-width: 768px) {
            .tabs {
                padding: 16px 24px 12px;
            }
        }

        /* Content Area */
        .content {
            padding: 16px 16px 24px;
            overflow-y: auto;
            height: calc(100dvh - 56px);
        }

        @media (min-width: 768px) {
            .content {
                padding: 24px;
                height: calc(100dvh - 64px);
            }
        }

        /* Grid System - perfectly responsive */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 16px;
        }

        @media (min-width: 640px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1280px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Glass Panel & Card - harder, same as sidebar */
        .card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.25);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-weight: 600;
            font-size: 15px;
        }

        .status-dot {
            color: #34d399;
            font-size: 18px;
            line-height: 1;
        }

        .token-display {
            background: #0f172a;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            color: #93c5fd;
            word-break: break-all;
        }

        .btn-connect {
            margin-top: auto;
            padding: 12px;
            font-size: 14px;
            background: #3b82f6;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-connect:hover {
            background: #2563eb;
        }

        /* Empty State */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 0;
            text-align: center;
            color: #64748b;
        }

        .empty-state.visible {
            display: flex;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Modal - same as main app */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 9999;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 380px;
            padding: 24px;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: #64748b;
            font-size: 24px;
            cursor: pointer;
        }

        .input-field {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .input-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 24px;
        }

        .btn-flex {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 2px; }
    </style>
</head>
<body>

<!-- TOP BAR - exactly like main app, perfectly balanced for mobile & desktop -->
<div class="top-bar">
    <!-- LEFT: Workspaces dropdown + create button (exactly as requested) -->
    <div class="top-bar-left">
        <div class="workspaces-section">
            <select id="workspace-dropdown" class="form-input"></select>
            
            <!-- Create workspace button -->
            <button onclick="showCreateWorkspaceModal()" class="action-btn-small">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- RIGHT: Credits + Add button -->
    <div class="top-bar-right">
        <!-- Credits -->
        <div class="credits-badge">
            <div class="dot"></div>
            <span id="header-credits">0</span>
        </div>

        <!-- Add Terminal -->
        <button onclick="showAddModal()" class="btn-primary">
            <span style="font-size: 18px; line-height: 1;">+</span>
            <span>Add Terminal</span>
        </button>
    </div>
</div>

<!-- TABS - below top bar / add button area -->
<div class="tabs" id="tabs-container">
    <button onclick="setTab('fast')" id="tab-fast" class="tab-btn">Fast</button>
    <button onclick="setTab('recents')" id="tab-recents" class="tab-btn">Recents</button>
    <button onclick="setTab('favorites')" id="tab-favorites" class="tab-btn">Favorites</button>
    <button onclick="setTab('all')" id="tab-all" class="tab-btn active">All Terminals</button>
</div>

<!-- CONTENT -->
<div class="content">
    <div id="terminals-grid" class="grid-container"></div>

    <div id="empty-state" class="empty-state">
        <h3>No terminals in this workspace</h3>
        <button onclick="showAddModal()" class="btn-primary" style="margin-top: 20px;">Add Terminal</button>
    </div>
</div>

<!-- ADD TERMINAL MODAL -->
<div id="add-modal" onclick="if(event.target.id==='add-modal')hideAddModal()" class="modal-overlay">
    <div onclick="event.stopPropagation()" class="modal">
        <div class="modal-header">
            <h2 class="modal-title">New Terminal</h2>
            <button onclick="hideAddModal()" class="modal-close">×</button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 16px;">
            <input id="modal-name" placeholder="Display Name" class="input-field">
            <input id="modal-token" placeholder="Token (from KS Panel)" class="input-field input-mono">
        </div>

        <div class="modal-actions">
            <button onclick="hideAddModal()" class="btn-flex btn-secondary">Cancel</button>
            <button onclick="handleAddTerminal()" class="btn-flex btn-primary">Add Terminal</button>
        </div>
    </div>
</div>

<!-- CREATE WORKSPACE MODAL -->
<div id="create-ws-modal" onclick="if(event.target.id==='create-ws-modal')hideCreateWorkspaceModal()" class="modal-overlay">
    <div onclick="event.stopPropagation()" class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Create New Workspace</h2>
            <button onclick="hideCreateWorkspaceModal()" class="modal-close">×</button>
        </div>
        <input id="ws-name-input" placeholder="Workspace name (e.g. prod-ws)" class="input-field">
        <div class="modal-actions">
            <button onclick="hideCreateWorkspaceModal()" class="btn-flex btn-secondary">Cancel</button>
            <button onclick="confirmCreateWorkspace()" class="btn-flex btn-primary">Create Workspace</button>
        </div>
    </div>
</div>

<script>
    let terminals = [];
    let workspaces = [];
    let currentWorkspaceId = null;
    let currentTab = 'all';

    function loadTerminals() {
        const saved = localStorage.getItem('ks_ssh_terminals');
        terminals = saved ? JSON.parse(saved) : [];
    }

    function loadWorkspaces() {
        const saved = localStorage.getItem('ks_ssh_workspaces');
        workspaces = saved ? JSON.parse(saved) : [];
    }

    function saveTerminals() {
        localStorage.setItem('ks_ssh_terminals', JSON.stringify(terminals));
    }

    function saveWorkspaces() {
        localStorage.setItem('ks_ssh_workspaces', JSON.stringify(workspaces));
    }

    function populateWorkspaceDropdown() {
        const select = document.getElementById('workspace-dropdown');
        select.innerHTML = '';
        
        workspaces.forEach(ws => {
            const opt = document.createElement('option');
            opt.value = ws.id;
            opt.textContent = ws.name;
            if (ws.id === currentWorkspaceId) opt.selected = true;
            select.appendChild(opt);
        });

        if (workspaces.length > 0 && (!currentWorkspaceId || currentWorkspaceId === 'all')) {
            currentWorkspaceId = workspaces[0].id;
            select.value = currentWorkspaceId;
        }
    }

    function getFilteredTerminals() {
        let filtered = terminals.filter(t => t.workspaceId === currentWorkspaceId);

        if (currentTab === 'recents') {
            filtered.sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
        } else if (currentTab === 'fast') {
            filtered = filtered.slice(0, 6);
        }
        return filtered;
    }

    function renderCards() {
        const grid = document.getElementById('terminals-grid');
        const empty = document.getElementById('empty-state');
        grid.innerHTML = '';

        const filtered = getFilteredTerminals();

        if (filtered.length === 0) {
            empty.classList.add('visible');
            return;
        }

        empty.classList.remove('visible');

        filtered.forEach(term => {
            const card = document.createElement('div');
            card.className = "card";

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">${term.name}</div>
                    <div class="status-dot">●</div>
                </div>
                <div class="token-display">${term.token}</div>
                <button onclick="connectTerminal('${term.id}')" class="btn-connect">Connect Now</button>
            `;

            grid.appendChild(card);
        });
    }

    function setTab(tab) {
        currentTab = tab;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === `tab-${tab}`);
        });

        renderCards();
    }

    function showAddModal() {
        document.getElementById('modal-name').value = '';
        document.getElementById('modal-token').value = '';
        document.getElementById('add-modal').classList.add('visible');
    }

    function hideAddModal() {
        document.getElementById('add-modal').classList.remove('visible');
    }

    function handleAddTerminal() {
        const name = document.getElementById('modal-name').value.trim();
        const token = document.getElementById('modal-token').value.trim();

        if (!token) {
            alert('Token is required');
            return;
        }

        const newTerm = {
            id: Date.now().toString(),
            name: name || `Terminal ${terminals.length + 1}`,
            token: token,
            workspaceId: currentWorkspaceId,
            added: Date.now()
        };

        terminals.unshift(newTerm);
        saveTerminals();
        hideAddModal();
        renderCards();
    }

    function connectTerminal(id) {
        const term = terminals.find(t => t.id === id);
        if (term) {
            console.log('%c✅ Connecting to terminal: ' + term.name, 'color:#60a5fa; font-weight:bold');
            alert('Connecting to: ' + term.name + '\n\n(Token: ' + term.token + ')');
        }
    }

    function showCreateWorkspaceModal() {
        document.getElementById('ws-name-input').value = '';
        document.getElementById('create-ws-modal').classList.add('visible');
    }

    function hideCreateWorkspaceModal() {
        document.getElementById('create-ws-modal').classList.remove('visible');
    }

    function confirmCreateWorkspace() {
        const name = document.getElementById('ws-name-input').value.trim();
        if (!name) {
            alert('Workspace name is required');
            return;
        }
        const newWs = {
            id: Date.now().toString(),
            name: name,
            created: Date.now()
        };
        workspaces.unshift(newWs);
        saveWorkspaces();
        populateWorkspaceDropdown();
        hideCreateWorkspaceModal();
        currentWorkspaceId = newWs.id;
        renderCards();
    }

    function init() {
        loadTerminals();
        loadWorkspaces();
        populateWorkspaceDropdown();

        const savedWs = localStorage.getItem('ks_current_workspace');
        if (savedWs && workspaces.some(w => w.id === savedWs)) {
            currentWorkspaceId = savedWs;
            document.getElementById('workspace-dropdown').value = savedWs;
        }

        document.getElementById('workspace-dropdown').addEventListener('change', function() {
            currentWorkspaceId = this.value;
            localStorage.setItem('ks_current_workspace', currentWorkspaceId);
            renderCards();
        });

        renderCards();
    }

    window.onload = init;
</script>

</body>
</html>
